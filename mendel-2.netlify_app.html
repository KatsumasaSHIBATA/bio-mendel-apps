<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二遺伝子雑種 LIVE集計</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- Babel設定：自動ランタイムによるエラーを回避するためclassicモードを登録 -->
    <script>
        Babel.registerPreset('react-classic', {
            presets: [
                [Babel.availablePresets['react'], { "runtime": "classic" }]
            ]
        });
    </script>

    <!-- アプリケーションコード -->
    <script type="text/babel" data-type="module" data-presets="react-classic">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const { useState, useEffect, useMemo, useRef } = React;

        // 管理者パスワード設定
        const ADMIN_PASSWORD = "9331";

        const isCanvasEnv = typeof __firebase_config !== 'undefined' && typeof __app_id !== 'undefined';
        const myFirebaseConfig = {
            apiKey: "AIzaSyCar5BfWLpkeMZY3CvQXWPafMcy7-3j0Ao",
            authDomain: "mendelapp-e8546.firebaseapp.com",
            projectId: "mendelapp-e8546",
            storageBucket: "mendelapp-e8546.firebasestorage.app",
            messagingSenderId: "440177963313",
            appId: "1:440177963313:web:4a022fa480f2217aeb0010"
        };
        const firebaseConfig = isCanvasEnv ? JSON.parse(__firebase_config) : myFirebaseConfig;
        const currentAppId = isCanvasEnv ? __app_id : "matsumoto-mendel-2"; 

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const PHENOTYPES = [
            { id: 'AB', label: '[AB]', name: '丸・黄', target: 9, btnColor: 'bg-amber-100 hover:bg-amber-200 text-amber-900 border-amber-300', barColor: 'bg-amber-400' },
            { id: 'Ab', label: '[Ab]', name: '丸・緑', target: 3, btnColor: 'bg-emerald-100 hover:bg-emerald-200 text-emerald-900 border-emerald-300', barColor: 'bg-emerald-500' },
            { id: 'aB', label: '[aB]', name: 'しわ・黄', target: 3, btnColor: 'bg-orange-100 hover:bg-orange-200 text-orange-900 border-orange-300', barColor: 'bg-orange-400' },
            { id: 'ab', label: '[ab]', name: 'しわ・緑', target: 1, btnColor: 'bg-slate-100 hover:bg-slate-200 text-slate-800 border-slate-300', barColor: 'bg-slate-400' },
        ];

        const CLASS_LIST = ['A組', 'B組', 'C組', 'D組', 'E組', 'F組', 'G組', 'H組', '先生モード'];

        function App() {
            const [user, setUser] = useState(null);
            const [classGroup, setClassGroup] = useState('A組');
            const [name, setName] = useState(''); 
            const [passwordInput, setPasswordInput] = useState('');
            const [isNameSet, setIsNameSet] = useState(false);
            const [myCounts, setMyCounts] = useState({ AB: 0, Ab: 0, aB: 0, ab: 0 });
            const [allData, setAllData] = useState([]);
            const [error, setError] = useState(null);
            
            const [filterClass, setFilterClass] = useState('all');
            const [showHelp, setShowHelp] = useState(false);
            const [showAnalysis, setShowAnalysis] = useState(false);

            const [allTimers, setAllTimers] = useState({});
            const [timeLeft, setTimeLeft] = useState(null);
            const [timerMinutes, setTimerMinutes] = useState(5); 

            const isNameSetRef = useRef(isNameSet);
            useEffect(() => { isNameSetRef.current = isNameSet; }, [isNameSet]);
            
            const classGroupRef = useRef(classGroup);
            useEffect(() => { classGroupRef.current = classGroup; }, [classGroup]);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (isCanvasEnv && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        setError(`認証エラー: ${e.message}`);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;

                const dataRef = collection(db, 'artifacts', currentAppId, 'public', 'data', 'mendel_dihybrid_data');
                const unsubscribeData = onSnapshot(query(dataRef), (snapshot) => {
                    const data = [];
                    snapshot.forEach((doc) => data.push({ id: doc.id, ...doc.data() }));
                    setAllData(data);

                    if (!isNameSetRef.current) {
                        const myDoc = data.find(d => d.id === user.uid);
                        if (myDoc && myDoc.name) {
                            if (myDoc.classGroup === '先生モード') {
                                deleteDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'mendel_dihybrid_data', user.uid)).catch(console.error);
                            } else {
                                setClassGroup(myDoc.classGroup || 'A組');
                                setName(myDoc.name);
                                setMyCounts({ AB: myDoc.AB || 0, Ab: myDoc.Ab || 0, aB: myDoc.aB || 0, ab: myDoc.ab || 0 });
                                setIsNameSet(true);
                            }
                        }
                    } else {
                        const myDoc = data.find(d => d.id === user.uid);
                        if (!myDoc && classGroupRef.current !== '先生モード') {
                            alert("管理者によってデータが消去されました。\n最初から正しいクラスとペア名で入り直してください。");
                            setIsNameSet(false);
                            setName('');
                            setMyCounts({ AB: 0, Ab: 0, aB: 0, ab: 0 });
                        }
                    }
                });

                const timerRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'timer_state', 'classes');
                const unsubscribeTimer = onSnapshot(timerRef, (docSnap) => {
                    if (docSnap.exists()) {
                        setAllTimers(docSnap.data());
                    } else {
                        setAllTimers({});
                    }
                });

                return () => { unsubscribeData(); unsubscribeTimer(); };
            }, [user]);

            const activeTimerClass = classGroup === '先生モード' ? filterClass : classGroup;
            const currentTimerState = allTimers[activeTimerClass] || { isRunning: false, endTime: null };

            useEffect(() => {
                if (currentTimerState.isRunning && currentTimerState.endTime) {
                    const interval = setInterval(() => {
                        const diff = currentTimerState.endTime - Date.now();
                        if (diff <= 0) {
                            setTimeLeft(0);
                            clearInterval(interval);
                        } else {
                            setTimeLeft(diff);
                        }
                    }, 100);
                    return () => clearInterval(interval);
                } else {
                    setTimeLeft(null);
                }
            }, [currentTimerState.isRunning, currentTimerState.endTime]);

            const updateDB = async (newCounts, currentClassGroup, currentName) => {
                if (!user) return;
                try {
                    await setDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'mendel_dihybrid_data', user.uid), {
                        classGroup: currentClassGroup, name: currentName, ...newCounts, updatedAt: new Date().toISOString()
                    }, { merge: true });
                } catch (e) {
                    alert("データ保存に失敗しました。");
                }
            };

            const isInputDisabled = classGroup !== '先生モード' && (!currentTimerState.isRunning || timeLeft === 0 || timeLeft === null);

            const handleIncrement = (type) => {
                if (isInputDisabled) return;
                const newCounts = { ...myCounts, [type]: myCounts[type] + 1 };
                setMyCounts(newCounts);
                updateDB(newCounts, classGroup, name);
            };

            const handleDecrement = (type) => {
                if (isInputDisabled) return;
                if (myCounts[type] > 0) {
                    const newCounts = { ...myCounts, [type]: myCounts[type] - 1 };
                    setMyCounts(newCounts);
                    updateDB(newCounts, classGroup, name);
                }
            };

            const handleDirectInput = (type, value) => {
                const num = value === '' ? 0 : parseInt(value, 10);
                if (!isNaN(num) && num >= 0) {
                    const newCounts = { ...myCounts, [type]: num };
                    setMyCounts(newCounts);
                    updateDB(newCounts, classGroup, name);
                }
            };

            const handleJoin = async (e) => {
                e.preventDefault();
                if (classGroup === '先生モード') {
                    if (passwordInput === ADMIN_PASSWORD) {
                        const oldTeacherDocs = allData.filter(d => d.classGroup === '先生モード');
                        for (const oldDoc of oldTeacherDocs) {
                            await deleteDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'mendel_dihybrid_data', oldDoc.id)).catch(console.error);
                        }

                        setIsNameSet(true);
                        setName('先生');
                        const resetCounts = { AB: 0, Ab: 0, aB: 0, ab: 0 };
                        setMyCounts(resetCounts);
                        updateDB(resetCounts, '先生モード', '先生');
                        setFilterClass('all');
                    } else {
                        alert("パスワードが違います。");
                    }
                } else if (name.trim()) {
                    setIsNameSet(true);
                    updateDB(myCounts, classGroup, name.trim());
                    setFilterClass(classGroup);
                }
            };

            const handleReset = async () => {
                if (filterClass === 'simulation') {
                    if (!confirm(`シミュレーション（先生）のデータをすべて 0 に戻しますか？`)) return;
                    setMyCounts({ AB: 0, Ab: 0, aB: 0, ab: 0 });
                    updateDB({ AB: 0, Ab: 0, aB: 0, ab: 0 }, '先生モード', '先生');
                    alert(`シミュレーションデータをリセットしました。`);
                    return;
                }

                const targetName = filterClass === 'all' ? '学年全体（生徒）' : filterClass;
                if (!confirm(`本当に「${targetName}」のデータをすべて削除して 0 に戻しますか？`)) return;
                try {
                    const targets = filterClass === 'all' ? allData.filter(d => d.classGroup !== '先生モード') : allData.filter(d => d.classGroup === filterClass);
                    for (const d of targets) await deleteDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'mendel_dihybrid_data', d.id));
                    alert(`${targetName} のデータをリセットしました。`);
                } catch (e) {
                    alert("データの削除に失敗しました。");
                }
            };

            const handleKick = async (id, className, groupName) => {
                if (!confirm(`本当に ${className}「${groupName}」のデータを消去し、ログアウトさせますか？`)) return;
                try {
                    await deleteDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'mendel_dihybrid_data', id));
                } catch (e) {
                    alert("データの削除に失敗しました。");
                }
            };

            const startTimer = async (minutes) => {
                if (filterClass === 'all' || filterClass === 'simulation') {
                    alert("タイマーを開始する対象クラスを選択してください。");
                    return;
                }
                const mins = parseInt(minutes, 10);
                if (isNaN(mins) || mins <= 0) return;
                const endTime = Date.now() + mins * 60 * 1000;
                await setDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'timer_state', 'classes'), {
                    [filterClass]: { endTime, isRunning: true }
                }, { merge: true });
            };

            const stopTimer = async () => {
                if (filterClass === 'all' || filterClass === 'simulation') {
                    alert("タイマーを停止する対象クラスを選択してください。");
                    return;
                }
                await setDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'timer_state', 'classes'), {
                    [filterClass]: { endTime: null, isRunning: false }
                }, { merge: true });
            };

            const handleExportCSV = () => {
                let targetData = [];
                if (filterClass === 'simulation') {
                    targetData = allData.filter(d => d.classGroup === '先生モード');
                } else if (filterClass === 'all') {
                    targetData = allData.filter(d => d.classGroup !== '先生モード');
                } else {
                    targetData = allData.filter(d => d.classGroup === filterClass);
                }

                if (targetData.length === 0) {
                    alert("出力するデータがありません。");
                    return;
                }
                
                const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
                let csvContent = "クラス,ペア名,[AB],[Ab],[aB],[ab],合計\n";
                
                targetData.forEach(d => {
                    const AB = d.AB || 0;
                    const Ab = d.Ab || 0;
                    const aB = d.aB || 0;
                    const ab = d.ab || 0;
                    const total = AB + Ab + aB + ab;
                    const escape = (str) => `"${String(str || '').replace(/"/g, '""')}"`;
                    csvContent += `${escape(d.classGroup)},${escape(d.name)},${AB},${Ab},${aB},${ab},${total}\n`;
                });
                
                const blob = new Blob([bom, csvContent], { type: "text/csv" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                
                const now = new Date();
                const yyyy = now.getFullYear();
                const mm = String(now.getMonth() + 1).padStart(2, '0');
                const dd = String(now.getDate()).padStart(2, '0');
                const hh = String(now.getHours()).padStart(2, '0');
                const min = String(now.getMinutes()).padStart(2, '0');
                link.download = `二遺伝子雑種_${filterClass}_${yyyy}${mm}${dd}_${hh}${min}.csv`;
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            const formatTime = (ms) => {
                if (ms === null) return '';
                const totalSeconds = Math.ceil(ms / 1000);
                const m = Math.floor(totalSeconds / 60);
                const s = totalSeconds % 60;
                return `${m}:${s.toString().padStart(2, '0')}`;
            };

            const processedData = useMemo(() => {
                let targetData = [];
                if (classGroup === '先生モード') {
                    if (filterClass === 'simulation') {
                        targetData = allData.filter(d => d.classGroup === '先生モード');
                    } else if (filterClass === 'all') {
                        targetData = allData.filter(d => d.classGroup !== '先生モード');
                    } else {
                        targetData = allData.filter(d => d.classGroup === filterClass);
                    }
                } else {
                    targetData = allData.filter(d => d.classGroup === classGroup);
                }
                    
                let maxTotal = 0;
                const dataWithStats = targetData.map(d => {
                    const total = (d.AB || 0) + (d.Ab || 0) + (d.aB || 0) + (d.ab || 0);
                    if (total > maxTotal) maxTotal = total;

                    const alerts = [];
                    if (total === 0) {
                        alerts.push({ icon: '💤', text: '未参加', color: 'bg-slate-200 text-slate-600 border-slate-300' });
                    } else {
                        if (total >= 120 && d.classGroup !== '先生モード') {
                            alerts.push({ icon: '⚡', text: '爆速(不正疑い)', color: 'bg-red-100 text-red-700 border-red-200' });
                        }
                        if (total >= 16) {
                            const expAB = total * 9/16;
                            const expAb = total * 3/16;
                            const expaB = total * 3/16;
                            const expab = total * 1/16;
                            if (Math.abs((d.AB||0) - expAB) <= 1.5 && Math.abs((d.Ab||0) - expAb) <= 1 && Math.abs((d.aB||0) - expaB) <= 1 && Math.abs((d.ab||0) - expab) <= 1) {
                                alerts.push({ icon: '🤖', text: '9:3:3:1に酷似', color: 'bg-purple-100 text-purple-700 border-purple-200' });
                            }
                        }
                        if (total >= 12 && Math.abs((d.AB||0) - (d.Ab||0)) <= 1 && Math.abs((d.Ab||0) - (d.aB||0)) <= 1 && Math.abs((d.aB||0) - (d.ab||0)) <= 1) {
                            alerts.push({ icon: '🚨', text: '均等すぎる', color: 'bg-orange-100 text-orange-700 border-orange-200' });
                        }
                    }

                    return { ...d, total, alerts };
                });
                return dataWithStats.map(d => ({
                    ...d, isTopCount: d.total > 0 && d.total === maxTotal
                })).sort((a, b) => b.total - a.total); 
            }, [allData, filterClass, classGroup]);

            const totals = useMemo(() => {
                let targetData = [];
                if (classGroup === '先生モード') {
                    if (filterClass === 'simulation') {
                        targetData = allData.filter(d => d.classGroup === '先生モード');
                    } else if (filterClass === 'all') {
                        targetData = allData.filter(d => d.classGroup !== '先生モード');
                    } else {
                        targetData = allData.filter(d => d.classGroup === filterClass);
                    }
                } else {
                    targetData = allData.filter(d => d.classGroup !== '先生モード');
                }

                return targetData.reduce((acc, curr) => ({
                    AB: acc.AB + (curr.AB || 0),
                    Ab: acc.Ab + (curr.Ab || 0),
                    aB: acc.aB + (curr.aB || 0),
                    ab: acc.ab + (curr.ab || 0)
                }), { AB: 0, Ab: 0, aB: 0, ab: 0 });
            }, [allData, filterClass, classGroup]);

            const totalTrials = totals.AB + totals.Ab + totals.aB + totals.ab;
            const maxCount = Math.max(totals.AB, totals.Ab, totals.aB, totals.ab, 1);

            const getRatio = (count) => {
                return totals.ab > 0 ? (count / totals.ab).toFixed(1) : '-';
            };

            const shapeStats = useMemo(() => {
                const round = totals.AB + totals.Ab;
                const wrinkled = totals.aB + totals.ab;
                const ratio = wrinkled > 0 ? (round / wrinkled).toFixed(1) : '-';
                return { round, wrinkled, ratio };
            }, [totals]);

            const colorStats = useMemo(() => {
                const yellow = totals.AB + totals.aB;
                const green = totals.Ab + totals.ab;
                const ratio = green > 0 ? (yellow / green).toFixed(1) : '-';
                return { yellow, green, ratio };
            }, [totals]);

            if (error) return <div className="min-h-screen flex items-center justify-center text-red-500 font-bold px-4 text-center">{error}</div>;
            if (!user) return <div className="min-h-screen flex items-center justify-center text-slate-500 font-bold">システムに接続中...</div>;

            if (!isNameSet) {
                return (
                    <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border-t-8 border-blue-600 relative">
                            <button onClick={() => setShowHelp(true)} className="absolute top-4 right-4 w-8 h-8 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 font-bold flex items-center justify-center transition-colors font-serif italic" title="アプリの概要">i</button>
                            <h1 className="text-2xl font-bold text-center text-slate-800 mb-2">二遺伝子雑種 LIVE集計</h1>
                            <p className="text-center text-slate-500 mb-6 text-sm">自分のクラスとペア名を入力してください</p>
                            <form onSubmit={handleJoin} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-1">クラス</label>
                                    <select value={classGroup} onChange={(e) => setClassGroup(e.target.value)} className="w-full px-4 py-3 rounded-lg border-2 border-slate-200 focus:border-blue-500 outline-none font-bold text-slate-700 bg-white">
                                        {CLASS_LIST.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                {classGroup !== '先生モード' ? (
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">ペアの名前</label>
                                        <input type="text" value={name} onChange={(e) => setName(e.target.value)} placeholder="例：メンデルとグレーテルペア" className="w-full px-4 py-3 rounded-lg border-2 border-slate-200 focus:border-blue-500 outline-none font-bold text-slate-700" required />
                                    </div>
                                ) : (
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">管理者パスワード</label>
                                        <input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} placeholder="パスワードを入力" className="w-full px-4 py-3 rounded-lg border-2 border-slate-200 focus:border-red-500 outline-none font-bold text-slate-700" required />
                                    </div>
                                )}
                                <button type="submit" className={`w-full ${classGroup === '先生モード' ? 'bg-slate-700 hover:bg-slate-800' : 'bg-blue-600 hover:bg-blue-700'} text-white font-bold py-3 rounded-lg transition-colors mt-4`}>
                                    {classGroup === '先生モード' ? '管理者としてログイン' : 'ログイン'}
                                </button>
                            </form>
                        </div>
                        {showHelp && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                                <div className="bg-white rounded-2xl p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto relative shadow-2xl">
                                    <button onClick={() => setShowHelp(false)} className="absolute top-4 right-4 w-8 h-8 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 font-bold flex items-center justify-center">✕</button>
                                    <h2 className="text-xl font-bold text-slate-800 mb-4 border-b border-blue-200 pb-2 flex items-center gap-2">
                                        <span className="font-serif italic text-blue-600">i</span> アプリの概要
                                    </h2>
                                    <div className="space-y-6 text-sm text-slate-700">
                                        <div>
                                            <h4 className="font-bold text-slate-800 bg-slate-100 px-2 py-1 rounded inline-block mb-2">この実験のねらい</h4>
                                            <ol className="list-decimal pl-5 space-y-2">
                                                <li><b>独立の法則を知る:</b> 2つの特徴が独立して受け継がれる仕組みを理解しよう！</li>
                                                <li><b>9:3:3:1 を体感:</b> みんなのデータを集めると全体として「9：3：3：1」の比率に収束していく現象を見届けよう。</li>
                                            </ol>
                                        </div>
                                    </div>
                                    <div className="mt-6 text-center">
                                        <button onClick={() => setShowHelp(false)} className="bg-slate-800 hover:bg-slate-700 text-white font-bold py-2 px-8 rounded-lg shadow-sm">閉じる</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20">
                    <div className="sticky top-0 z-40 w-full flex flex-col shadow-md bg-white">
                        <header className="bg-slate-800 text-white p-3 md:p-4">
                            <div className="max-w-4xl mx-auto flex flex-col lg:flex-row lg:justify-between lg:items-center gap-2 md:gap-3">
                                <h1 className="font-bold text-lg flex items-center gap-2 whitespace-nowrap">
                                    <i className="lucide-activity text-blue-400"></i>
                                    LIVE集計：二遺伝子雑種
                                </h1>
                                <div className="flex flex-wrap items-center gap-1.5 md:gap-2">
                                    {classGroup === '先生モード' && (
                                        <div className="flex items-center gap-1 bg-slate-700 p-1 pl-2 rounded-lg text-sm border border-slate-600">
                                            <span className="font-bold text-slate-300">⏱</span>
                                            <input 
                                                type="number" min="1" max="60" 
                                                value={timerMinutes} 
                                                onChange={(e) => setTimerMinutes(e.target.value)}
                                                className="w-10 text-center text-slate-800 rounded outline-none p-0.5 font-bold shadow-inner"
                                            />
                                            <span className="text-slate-300">分</span>
                                            <button onClick={() => startTimer(timerMinutes)} className="bg-slate-600 hover:bg-blue-500 text-white px-2 py-0.5 rounded transition-colors font-bold shadow-sm ml-1">開始</button>
                                            <button onClick={stopTimer} className="bg-slate-600 hover:bg-red-500 text-white px-2 py-0.5 rounded transition-colors font-bold shadow-sm">停止</button>
                                        </div>
                                    )}
                                    
                                    <button onClick={() => setShowHelp(true)} className="bg-slate-700 hover:bg-slate-600 text-white text-sm font-bold py-1 px-2 md:px-3 rounded-lg transition-colors flex items-center gap-1 shadow-sm">
                                        {classGroup === '先生モード' ? '？ マニュアル' : '？ ルール'}
                                    </button>
                                    
                                    {classGroup !== '先生モード' && (
                                        <div className="flex items-center gap-1 bg-slate-700 px-2 md:px-3 py-1 rounded-lg text-sm font-bold text-slate-200">
                                            📍 {classGroup}
                                        </div>
                                    )}

                                    {classGroup === '先生モード' && (
                                        <div className="flex items-center gap-1.5 bg-slate-700 p-1 pl-2 rounded-lg text-sm">
                                            <span className="font-bold text-slate-300">対象:</span>
                                            <select value={filterClass} onChange={(e) => setFilterClass(e.target.value)} className="bg-slate-600 text-white font-bold py-0.5 px-1 rounded outline-none border border-slate-500 focus:border-blue-400 cursor-pointer">
                                                <option value="simulation">デモ</option>
                                                <option value="all">学年全体</option>
                                                {CLASS_LIST.filter(c => c !== '先生モード').map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                    )}

                                    {classGroup === '先生モード' && (
                                        <>
                                            <button onClick={handleExportCSV} className="bg-emerald-500 hover:bg-emerald-600 text-white text-sm font-bold py-1 px-2 md:px-3 rounded-lg transition-colors flex items-center gap-1 shadow-sm">CSV</button>
                                            <button onClick={handleReset} className="bg-red-500 hover:bg-red-600 text-white text-sm font-bold py-1 px-2 md:px-3 rounded-lg transition-colors flex items-center gap-1 shadow-sm">リセット</button>
                                        </>
                                    )}
                                </div>
                            </div>
                        </header>

                        <div className={`w-full text-center font-black transition-colors ${
                            activeTimerClass === 'all' ? 'bg-slate-200 text-slate-600 py-2 md:py-3 text-xl md:text-2xl' :
                            currentTimerState.isRunning && timeLeft > 0 && timeLeft <= 10000 ? 'bg-red-100 text-red-600 py-2 md:py-3 text-2xl md:text-3xl' :
                            currentTimerState.isRunning && timeLeft > 10000 ? 'bg-blue-100 text-blue-800 py-2 md:py-3 text-2xl md:text-3xl' :
                            currentTimerState.isRunning && timeLeft === 0 ? 'bg-red-500 text-white animate-pulse py-2 md:py-3 text-2xl md:text-3xl' :
                            'bg-slate-200 text-slate-600 py-2 md:py-3 text-xl md:text-2xl'
                        }`}>
                            {
                                activeTimerClass === 'all' ? '対象クラスを選択してタイマーを使用' :
                                currentTimerState.isRunning && timeLeft > 0 ? `残り ${formatTime(timeLeft)}` :
                                currentTimerState.isRunning && timeLeft === 0 ? '終了！！入力ストップ！' :
                                '待機中（タイマー開始で入力可能になります）'
                            }
                        </div>
                    </div>

                    <main className="max-w-4xl mx-auto p-4 space-y-6 mt-4">
                        <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 md:p-6">
                            <div className="flex flex-col md:flex-row md:justify-between md:items-center mb-6 border-b pb-2 gap-2">
                                <h2 className="text-lg font-bold text-slate-800">
                                    {classGroup === '先生モード' ? (filterClass === 'simulation' ? '📊 デモ' : filterClass === 'all' ? '🏫 学年全体' : `📝 ${filterClass}`) : '🏫 学年全体'} のデータ
                                </h2>
                                <div className="flex flex-wrap items-center gap-2">
                                    {classGroup === '先生モード' && (
                                        <button 
                                            onClick={() => setShowAnalysis(!showAnalysis)}
                                            className={`text-sm font-bold px-3 py-1 rounded-full border transition-colors ${showAnalysis ? 'bg-indigo-500 text-white border-indigo-600 shadow-inner' : 'bg-indigo-50 text-indigo-600 border-indigo-200 hover:bg-indigo-100 shadow-sm'}`}
                                        >
                                            {showAnalysis ? '分析を閉じる' : '✨ 独立の法則を分析'}
                                        </button>
                                    )}
                                    <span className="font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full text-sm border border-blue-100">総試行回数: {totalTrials} 回</span>
                                </div>
                            </div>
                            
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                {processedData.length === 0 ? (
                                    <div className="col-span-full text-center text-slate-400 text-sm py-4">データがありません</div>
                                ) : (
                                    processedData.map(d => (
                                        <div key={d.id} className={`relative p-3 rounded-lg text-sm border shadow-sm transition-all ${
                                            d.id === user?.uid ? 'bg-blue-50 border-blue-300 ring-2 ring-blue-300 scale-105 z-10' : 
                                            (d.total === 0 ? 'bg-slate-100 border-slate-200 opacity-60 grayscale' : 'bg-white border-slate-200')
                                        }`}>
                                            {classGroup === '先生モード' && d.classGroup !== '先生モード' && (
                                                <button 
                                                    onClick={() => handleKick(d.id, d.classGroup, d.name)}
                                                    className="absolute -top-2 -left-2 bg-red-100 text-red-600 hover:bg-red-500 hover:text-white rounded-full w-6 h-6 flex items-center justify-center font-bold shadow-md transition-colors z-20"
                                                    title="削除"
                                                >✕</button>
                                            )}
                                            {d.isTopCount && <div className="absolute -top-2 -right-2"><span className="bg-yellow-400 text-white px-1.5 py-0.5 rounded text-[10px] font-bold shadow">TOP</span></div>}
                                            <div className="text-xs font-bold text-blue-500 mb-0.5">{d.classGroup}</div>
                                            <div className="font-bold text-slate-800 truncate mb-1 text-base">{d.name}</div>
                                            <div className="text-xs font-bold bg-slate-200 text-slate-600 px-2 py-1 rounded inline-block">計 {d.total} 回</div>
                                            {classGroup === '先生モード' && d.alerts?.map((al, idx) => (
                                                <div key={idx} className={`text-[10px] font-bold px-1.5 py-0.5 rounded border mt-1 ${al.color}`}>
                                                    {al.icon} {al.text}
                                                </div>
                                            ))}
                                        </div>
                                    ))
                                )}
                            </div>
                        </section>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
