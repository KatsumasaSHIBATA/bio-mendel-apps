<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二遺伝子雑種 LIVE集計</title>
    <!-- Tailwind CSS (スタイリング) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (UI構築) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (ブラウザ上でJSXを変換) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- Babel設定 -->
    <script>
        Babel.registerPreset('react-classic', {
            presets: [
                [Babel.availablePresets['react'], { "runtime": "classic" }]
            ]
        });
    </script>

    <!-- アプリケーションのコード -->
    <script type="text/babel" data-type="module" data-presets="react-classic">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const { useState, useEffect, useMemo } = React;

        // =====================================================================
        // 環境判定（プレビュー画面か、GitHub本番環境か）
        // =====================================================================
        const isCanvasEnv = typeof __firebase_config !== 'undefined' && typeof __app_id !== 'undefined';

        // 先生のFirebase設定情報（合鍵）
        const myFirebaseConfig = {
            apiKey: "AIzaSyCar5BfWLpkeMZY3CvQXWPafMcy7-3j0Ao",
            authDomain: "mendelapp-e8546.firebaseapp.com",
            projectId: "mendelapp-e8546",
            storageBucket: "mendelapp-e8546.firebasestorage.app",
            messagingSenderId: "440177963313",
            appId: "1:440177963313:web:4a022fa480f2217aeb0010"
        };

        // 環境に応じて設定を自動切り替え
        const firebaseConfig = isCanvasEnv ? JSON.parse(__firebase_config) : myFirebaseConfig;
        const currentAppId = isCanvasEnv ? __app_id : "matsumoto-mendel-2"; // mendel-2用にIDを変更

        // Firebaseの初期化
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 定数設定（二遺伝子雑種の表現型） ---
        const PHENOTYPES = [
            { id: 'AB', label: '[AB]', name: '丸・黄', target: 9, 
              btnColor: 'bg-amber-100 hover:bg-amber-200 text-amber-900 border-amber-300', 
              barColor: 'bg-amber-400' },
            { id: 'Ab', label: '[Ab]', name: '丸・緑', target: 3, 
              btnColor: 'bg-emerald-100 hover:bg-emerald-200 text-emerald-900 border-emerald-300', 
              barColor: 'bg-emerald-500' },
            { id: 'aB', label: '[aB]', name: 'しわ・黄', target: 3, 
              btnColor: 'bg-orange-100 hover:bg-orange-200 text-orange-900 border-orange-300', 
              barColor: 'bg-orange-400' },
            { id: 'ab', label: '[ab]', name: 'しわ・緑', target: 1, 
              btnColor: 'bg-slate-100 hover:bg-slate-200 text-slate-800 border-slate-300', 
              barColor: 'bg-slate-400' },
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [name, setName] = useState('');
            const [isNameSet, setIsNameSet] = useState(false);
            const [myCounts, setMyCounts] = useState({ AB: 0, Ab: 0, aB: 0, ab: 0 });
            const [allData, setAllData] = useState([]);
            const [error, setError] = useState(null);

            // 1. 認証プロセス
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (isCanvasEnv && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        console.error("認証エラー詳細:", e);
                        setError(`認証エラー: ${e.message}。Firebaseで「匿名認証」が有効になっているか、ドメインが許可されているか確認してください。`);
                    }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // 2. リアルタイム同期（二遺伝子雑種用の保存場所 mendel_dihybrid_data を使用）
            useEffect(() => {
                if (!user) return;

                const dataRef = collection(db, 'artifacts', currentAppId, 'public', 'data', 'mendel_dihybrid_data');
                const q = query(dataRef);

                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const data = [];
                    snapshot.forEach((doc) => {
                        data.push({ id: doc.id, ...doc.data() });
                    });
                    data.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
                    setAllData(data);
                }, (err) => {
                    console.error("同期エラー:", err);
                    setError("データの読み込み権限がありません。Firestoreが「テストモード」か確認してください。");
                });
                return () => unsubscribe();
            }, [user]);

            // 3. データの書き込み
            const updateDB = async (newCounts, currentName) => {
                if (!user) return;
                try {
                    const docRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'mendel_dihybrid_data', user.uid);
                    await setDoc(docRef, {
                        name: currentName,
                        ...newCounts,
                        updatedAt: new Date().toISOString()
                    }, { merge: true });
                } catch (e) {
                    console.error("エラー:", e);
                    alert("データ保存に失敗しました。");
                }
            };

            const handleIncrement = (type) => {
                const newCounts = { ...myCounts, [type]: myCounts[type] + 1 };
                setMyCounts(newCounts);
                updateDB(newCounts, name);
            };

            const handleDecrement = (type) => {
                if (myCounts[type] > 0) {
                    const newCounts = { ...myCounts, [type]: myCounts[type] - 1 };
                    setMyCounts(newCounts);
                    updateDB(newCounts, name);
                }
            };

            const handleJoin = (e) => {
                e.preventDefault();
                if (name.trim()) {
                    setIsNameSet(true);
                    updateDB(myCounts, name.trim());
                }
            };

            const totals = useMemo(() => {
                return allData.reduce((acc, curr) => ({
                    AB: acc.AB + (curr.AB || 0),
                    Ab: acc.Ab + (curr.Ab || 0),
                    aB: acc.aB + (curr.aB || 0),
                    ab: acc.ab + (curr.ab || 0)
                }), { AB: 0, Ab: 0, aB: 0, ab: 0 });
            }, [allData]);

            const totalTrials = totals.AB + totals.Ab + totals.aB + totals.ab;
            const maxCount = Math.max(totals.AB, totals.Ab, totals.aB, totals.ab, 1);

            const getRatio = (count) => {
                return totals.ab > 0 ? (count / totals.ab).toFixed(1) : '-';
            };

            if (error) {
                return <div className="min-h-screen flex items-center justify-center text-red-500 font-bold px-4 text-center">{error}</div>;
            }

            if (!user) {
                return <div className="min-h-screen flex items-center justify-center text-slate-500 font-bold">システムに接続中...</div>;
            }

            if (!isNameSet) {
                return (
                    <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full">
                            <h1 className="text-2xl font-bold text-center text-slate-800 mb-2">二遺伝子雑種 LIVE集計</h1>
                            <p className="text-center text-slate-500 mb-8 text-sm">班の名前を入力して参加してください</p>
                            <form onSubmit={handleJoin} className="space-y-4">
                                <input
                                    type="text"
                                    value={name}
                                    onChange={(e) => setName(e.target.value)}
                                    placeholder="例：1班"
                                    className="w-full px-4 py-3 rounded-lg border-2 border-slate-200 focus:border-blue-500 outline-none text-center font-bold"
                                    required
                                />
                                <button type="submit" className="w-full bg-blue-600 text-white font-bold py-3 rounded-lg">実験スタート</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-slate-800 text-white p-4 sticky top-0 z-10 shadow-md">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <h1 className="font-bold text-lg">LIVE集計：二遺伝子雑種</h1>
                            <div className="text-sm bg-slate-700 px-3 py-1 rounded-full">参加: {allData.length}班</div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 space-y-6 mt-4">
                        {/* グラフエリア */}
                        <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 md:p-6">
                            <div className="flex justify-between items-center mb-6 border-b pb-2">
                                <h2 className="text-lg font-bold text-slate-700">クラス全体のデータ（目標 9：3：3：1）</h2>
                                <span className="font-bold text-slate-500 text-sm">総試行回数: {totalTrials} 回</span>
                            </div>

                            <div className="bg-slate-50 rounded-xl p-6 mb-6">
                                <div className="flex h-56 items-end gap-2 md:gap-4 relative">
                                    <div className="absolute inset-0 flex flex-col justify-between pointer-events-none opacity-10">
                                        <div className="border-b border-slate-800 w-full h-0"></div>
                                        <div className="border-b border-slate-800 w-full h-0"></div>
                                        <div className="border-b border-slate-800 w-full h-0"></div>
                                        <div className="border-b border-slate-800 w-full h-0"></div>
                                    </div>

                                    {PHENOTYPES.map((p) => {
                                        const count = totals[p.id];
                                        const heightPct = maxCount === 0 ? 0 : (count / maxCount) * 100;
                                        const ratio = p.id === 'ab' ? '1.0' : getRatio(count);
                                        
                                        return (
                                            <div key={p.id} className="flex-1 flex flex-col items-center gap-2 h-full z-10">
                                                <div className="text-xs md:text-sm font-bold text-slate-500">{ratio}</div>
                                                <div className="w-full max-w-[80px] bg-slate-200 rounded-t-md relative flex-1 flex items-end overflow-hidden">
                                                    <div 
                                                        className={`w-full ${p.barColor} transition-all duration-700 ease-out flex items-start justify-center pt-2`}
                                                        style={{ height: `${heightPct}%` }}
                                                    >
                                                        {heightPct > 15 && (
                                                            <span className="text-white font-bold text-xs shadow-sm">{count}</span>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="flex gap-2 md:gap-4 mt-3">
                                    {PHENOTYPES.map(p => (
                                        <div key={p.id} className="flex-1 text-center">
                                            <div className="font-bold text-slate-700">{p.label}</div>
                                            <div className="text-xs text-slate-500">{p.name}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="flex justify-center items-center gap-2 md:gap-4 text-center">
                                {PHENOTYPES.map((p, index) => (
                                    <React.Fragment key={p.id}>
                                        <div className="flex flex-col items-center">
                                            <span className={`text-xl md:text-3xl font-black ${p.id === 'ab' ? 'text-slate-500' : 'text-blue-600'}`}>
                                                {p.id === 'ab' ? '1.0' : getRatio(totals[p.id])}
                                            </span>
                                            <span className="text-xs text-slate-400 mt-1">目標: {p.target}</span>
                                        </div>
                                        {index < 3 && <span className="text-2xl font-bold text-slate-300 pb-4">:</span>}
                                    </React.Fragment>
                                ))}
                            </div>
                        </section>

                        {/* 入力パネル */}
                        <section className="bg-white rounded-2xl shadow-lg border-2 border-blue-500 p-4 md:p-6 relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-2 bg-blue-500"></div>
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-xl font-bold text-slate-800">🎯 {name} の入力パネル</h2>
                                <span className="text-sm font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full">
                                    計 {myCounts.AB + myCounts.Ab + myCounts.aB + myCounts.ab} 回
                                </span>
                            </div>
                            
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
                                {PHENOTYPES.map((p) => (
                                    <div key={p.id} className="flex flex-col gap-2">
                                        <button 
                                            onClick={() => handleIncrement(p.id)}
                                            className={`${p.btnColor} border-2 rounded-xl p-4 flex flex-col items-center justify-center transition-all active:scale-95 shadow-sm min-h-[100px]`}
                                        >
                                            <span className="text-2xl font-bold">＋ {p.label}</span>
                                            <span className="text-xs opacity-80 mt-1">{p.name}</span>
                                        </button>
                                        <div className="flex items-center justify-between bg-slate-50 rounded-lg p-2 border">
                                            <button onClick={() => handleDecrement(p.id)} className="p-1 text-slate-400 hover:text-red-500 font-bold">－</button>
                                            <span className="font-bold text-lg text-slate-700">{myCounts[p.id]}</span>
                                            <div className="w-6"></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* 班リスト */}
                        <section className="bg-slate-50 rounded-xl p-4 border border-slate-200">
                            <h3 className="text-sm font-bold text-slate-500 mb-3">各班の進捗状況</h3>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                                {allData.map(d => (
                                    <div key={d.id} className={`p-2 rounded-lg text-sm border ${d.id === user?.uid ? 'bg-blue-50 border-blue-300 font-bold' : 'bg-white'}`}>
                                        <div className="text-slate-600 truncate">{d.name}</div>
                                        <div className="text-xs text-slate-400 mt-1">
                                            計: {(d.AB || 0) + (d.Ab || 0) + (d.aB || 0) + (d.ab || 0)}回
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
