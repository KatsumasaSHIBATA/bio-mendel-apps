<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二遺伝子雑種 LIVE集計アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="text-slate-800">
    <div id="root"></div>

    <script>
        Babel.registerPreset('react-classic', {
            presets: [
                [Babel.availablePresets['react'], { "runtime": "classic" }]
            ]
        });
    </script>

    <script type="text/babel" data-type="module" data-presets="react-classic">
        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = {
            databaseURL: "https://mendelian-inheritance-default-rtdb.firebaseio.com/"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();

        // 共通クラスリスト
        const CLASSES = ['A組', 'B組', 'C組', 'D組', 'E組'];

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [classGroup, setClassGroup] = useState('');
            const [name, setName] = useState('');
            const [teamId, setTeamId] = useState('');
            const [allData, setAllData] = useState({});
            
            const [filterClass, setFilterClass] = useState('all');
            const [timerSettings, setTimerSettings] = useState({});
            
            const [showHelp, setShowHelp] = useState(false);
            const [expandedTeamId, setExpandedTeamId] = useState(null);
            const [showAnalysis, setShowAnalysis] = useState(false); // ▼ 新規追加: 独立の法則 分析パネル開閉用

            useEffect(() => {
                const dataRef = database.ref('dihybrid_results');
                const dataListener = dataRef.on('value', (snapshot) => {
                    if (snapshot.exists()) {
                        setAllData(snapshot.val());
                    } else {
                        setAllData({});
                    }
                });

                const timerRef = database.ref('timers');
                const timerListener = timerRef.on('value', (snapshot) => {
                    if (snapshot.exists()) {
                        setTimerSettings(snapshot.val());
                    } else {
                        setTimerSettings({});
                    }
                });

                return () => {
                    dataRef.off('value', dataListener);
                    timerRef.off('value', timerListener);
                };
            }, []);

            useEffect(() => {
                if (isLoggedIn && classGroup !== '先生モード') {
                    const checkRef = database.ref(`dihybrid_results/${teamId}`);
                    checkRef.get().then((snapshot) => {
                        if (!snapshot.exists()) {
                            setIsLoggedIn(false);
                            setTeamId('');
                            setClassGroup('');
                            setName('');
                            alert("管理者によってデータがリセットされたため、初期画面に戻ります。");
                        }
                    });
                }
            }, [allData, isLoggedIn, classGroup, teamId]);

            const [now, setNow] = useState(Date.now());
            useEffect(() => {
                const intervalId = setInterval(() => setNow(Date.now()), 100);
                return () => clearInterval(intervalId);
            }, []);

            const getActiveTimer = () => {
                if (classGroup === '先生モード') return null;
                const classTimer = timerSettings[classGroup];
                const allTimer = timerSettings['all'];

                let activeTimer = null;
                let activeTimerClass = null;

                if (classTimer && classTimer.endTime > now) {
                    activeTimer = classTimer;
                    activeTimerClass = classGroup;
                }
                if (allTimer && allTimer.endTime > now) {
                    if (!activeTimer || allTimer.endTime > activeTimer.endTime) {
                        activeTimer = allTimer;
                        activeTimerClass = 'all';
                    }
                }
                
                if (classTimer && classTimer.endTime <= now) {
                     if(!activeTimer) { activeTimer = classTimer; activeTimerClass = classGroup; }
                } else if (allTimer && allTimer.endTime <= now) {
                     if(!activeTimer) { activeTimer = allTimer; activeTimerClass = 'all'; }
                }

                return { timer: activeTimer, targetClass: activeTimerClass };
            };

            const { timer: currentTimerState, targetClass: activeTimerClass } = getActiveTimer() || {};
            const timeLeft = currentTimerState ? Math.max(0, currentTimerState.endTime - now) : null;
            const isInputAllowed = classGroup === '先生モード' ? true : (currentTimerState?.isRunning && timeLeft > 0);

            const formatTime = (ms) => {
                if (ms <= 0) return "00:00.0";
                const totalSeconds = Math.floor(ms / 1000);
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                const deciseconds = Math.floor((ms % 1000) / 100);
                return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${deciseconds}`;
            };

            const startTimer = (target, durationMinutes) => {
                const endTime = Date.now() + durationMinutes * 60 * 1000;
                database.ref(`timers/${target}`).set({
                    endTime: endTime,
                    duration: durationMinutes * 60 * 1000,
                    isRunning: true
                });
            };

            const stopTimer = (target) => {
                database.ref(`timers/${target}`).update({
                    endTime: Date.now(),
                    isRunning: false
                });
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (classGroup && name) {
                    if (classGroup === '先生モード') {
                        setIsLoggedIn(true);
                        setFilterClass('all');
                        setTeamId('simulation');
                    } else {
                        const newTeamId = `${classGroup}-${name}-${Date.now()}`;
                        database.ref(`dihybrid_results/${newTeamId}`).set({
                            classGroup,
                            name,
                            AB: 0,
                            Ab: 0,
                            aB: 0,
                            ab: 0,
                            timestamp: Date.now()
                        }).then(() => {
                            setTeamId(newTeamId);
                            setIsLoggedIn(true);
                        });
                    }
                }
            };

            const handleUpdateCount = (type, delta) => {
                if (classGroup !== '先生モード' && !isInputAllowed) return;
                
                let targetId = teamId;
                if (classGroup === '先生モード' && filterClass === 'simulation') {
                    targetId = 'simulation';
                } else if (classGroup === '先生モード') {
                    return;
                }

                const teamRef = database.ref(`dihybrid_results/${targetId}`);
                teamRef.get().then((snapshot) => {
                    let currentData = snapshot.val();
                    
                    if (!currentData && targetId === 'simulation') {
                        currentData = { classGroup: '先生モード', name: 'デモ', AB: 0, Ab: 0, aB: 0, ab: 0 };
                    }
                    
                    if (currentData) {
                        const newCount = Math.max(0, (currentData[type] || 0) + delta);
                        teamRef.update({ [type]: newCount });
                    }
                });
            };

            const handleReset = () => {
                if (window.confirm(`【${filterClass === 'all' ? '学年全体' : filterClass === 'simulation' ? 'デモ' : filterClass}】のデータをすべてリセットしますか？\n（※この操作は取り消せません）`)) {
                    if (filterClass === 'simulation') {
                        database.ref('dihybrid_results/simulation').remove();
                    } else if (filterClass === 'all') {
                        database.ref('dihybrid_results').remove();
                    } else {
                        Object.keys(allData).forEach(key => {
                            if (allData[key].classGroup === filterClass && key !== 'simulation') {
                                database.ref(`dihybrid_results/${key}`).remove();
                            }
                        });
                    }
                }
            };

            const handleDelete = (idToDelete) => {
                if (window.confirm(`班「${allData[idToDelete].name}」のデータを削除し、強制ログアウトさせますか？`)) {
                    database.ref(`dihybrid_results/${idToDelete}`).remove();
                }
            };

            const handleExportCSV = () => {
                const dataToExport = Object.keys(allData)
                    .filter(key => {
                        if (filterClass === 'all') return key !== 'simulation';
                        if (filterClass === 'simulation') return key === 'simulation';
                        return allData[key].classGroup === filterClass && key !== 'simulation';
                    })
                    .map(key => allData[key]);

                let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
                csvContent += "クラス,班名,AB(丸黄),Ab(丸緑),aB(しわ黄),ab(しわ緑),合計回数\n";

                dataToExport.forEach(row => {
                    const total = row.AB + row.Ab + row.aB + row.ab;
                    csvContent += `${row.classGroup},${row.name},${row.AB},${row.Ab},${row.aB},${row.ab},${total}\n`;
                });

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `メンデル二遺伝子集計_${filterClass}_${new Date().toLocaleDateString()}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const myCounts = allData[teamId] || { AB: 0, Ab: 0, aB: 0, ab: 0 };
            const simCounts = allData['simulation'] || { AB: 0, Ab: 0, aB: 0, ab: 0 };

            const displayData = useMemo(() => {
                let filtered = Object.values(allData);
                if (filterClass === 'all') {
                    filtered = filtered.filter(d => d.classGroup !== '先生モード' && d.name !== 'デモ');
                } else if (filterClass === 'simulation') {
                    filtered = [simCounts];
                } else {
                    filtered = filtered.filter(d => d.classGroup === filterClass && d.name !== 'デモ');
                }
                
                return filtered.reduce((acc, curr) => ({
                    AB: acc.AB + (curr.AB || 0),
                    Ab: acc.Ab + (curr.Ab || 0),
                    aB: acc.aB + (curr.aB || 0),
                    ab: acc.ab + (curr.ab || 0)
                }), { AB: 0, Ab: 0, aB: 0, ab: 0 });
            }, [allData, filterClass, simCounts]);

            const sortedData = useMemo(() => {
                let items = Object.keys(allData).map(key => ({ id: key, ...allData[key] }));
                
                if (filterClass === 'all') {
                    items = items.filter(d => d.classGroup !== '先生モード' && d.name !== 'デモ');
                } else if (filterClass === 'simulation') {
                    items = items.filter(d => d.id === 'simulation');
                } else {
                    items = items.filter(d => d.classGroup === filterClass && d.name !== 'デモ');
                }
                
                return items.sort((a, b) => {
                    const sumA = (a.AB || 0) + (a.Ab || 0) + (a.aB || 0) + (a.ab || 0);
                    const sumB = (b.AB || 0) + (b.Ab || 0) + (b.aB || 0) + (b.ab || 0);
                    return sumB - sumA;
                });
            }, [allData, filterClass]);

            const totalTrials = displayData.AB + displayData.Ab + displayData.aB + displayData.ab;
            const targetRatio = { AB: 9, Ab: 3, aB: 3, ab: 1 };

            // ▼ 計算：3:1再集計用のデータ
            const roundTotal = displayData.AB + displayData.Ab;
            const wrinkledTotal = displayData.aB + displayData.ab;
            const yellowTotal = displayData.AB + displayData.aB;
            const greenTotal = displayData.Ab + displayData.ab;

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border-t-8 border-blue-500">
                            <div className="flex justify-center mb-6">
                                <div className="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center text-blue-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 15c6.667-6 13.333 0 20-6"/><path d="M9 22c1.798-1.598 3-4.111 3-7.5S10.798 8.598 9 7"/><path d="M15 2c-1.798 1.598-3 4.111-3 7.5S13.202 15.402 15 17"/><path d="m17 17-2.5-2.5"/><path d="m14 8-1.5-1.5"/><path d="m7 17 2.5-2.5"/><path d="m10 8 1.5-1.5"/></svg>
                                </div>
                            </div>
                            <h1 className="text-2xl font-black text-center text-slate-800 mb-2 tracking-tight">二遺伝子雑種 <br/>LIVE集計システム</h1>
                            <p className="text-center text-slate-500 text-sm mb-8 font-medium">クラス・班名を選択してログインしてください</p>
                            
                            <form onSubmit={handleLogin} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-1">クラス</label>
                                    <select 
                                        className="w-full p-3 border border-slate-300 rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none font-medium"
                                        value={classGroup} 
                                        onChange={(e) => setClassGroup(e.target.value)} 
                                        required
                                    >
                                        <option value="">選択してください</option>
                                        {CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
                                        <option value="先生モード">👨‍🏫 先生モード</option>
                                    </select>
                                </div>
                                
                                {classGroup !== '先生モード' && (
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">班名・名前</label>
                                        <input 
                                            type="text" 
                                            className="w-full p-3 border border-slate-300 rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none font-medium"
                                            value={name} 
                                            onChange={(e) => setName(e.target.value)} 
                                            placeholder="例: 1班" 
                                            required 
                                        />
                                    </div>
                                )}
                                
                                <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold p-3 rounded-lg shadow-md hover:shadow-lg transition-all transform active:scale-95 flex items-center justify-center gap-2">
                                    ログイン
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-100 pb-10">
                    <div className="sticky top-0 z-40 bg-white/80 backdrop-blur-md shadow-sm border-b border-slate-200">
                        <header className="max-w-4xl mx-auto p-4 flex justify-between items-center">
                            <div>
                                <h1 className="text-lg md:text-xl font-black text-slate-800 flex items-center gap-2 tracking-tight">
                                    <div className="w-8 h-8 bg-blue-100 rounded flex items-center justify-center text-blue-600">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 15c6.667-6 13.333 0 20-6"/><path d="M9 22c1.798-1.598 3-4.111 3-7.5S10.798 8.598 9 7"/><path d="M15 2c-1.798 1.598-3 4.111-3 7.5S13.202 15.402 15 17"/><path d="m17 17-2.5-2.5"/><path d="m14 8-1.5-1.5"/><path d="m7 17 2.5-2.5"/><path d="m10 8 1.5-1.5"/></svg>
                                    </div>
                                    二遺伝子雑種 LIVE集計
                                </h1>
                                <p className="text-xs font-bold text-slate-500 mt-1 ml-10">
                                    {classGroup === '先生モード' ? '👨‍🏫 先生モード' : `${classGroup} - ${name}`}
                                </p>
                            </div>
                            
                            <div className="flex gap-2">
                                <button onClick={() => setShowHelp(true)} className="p-2 md:px-3 md:py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg text-sm font-bold transition-colors flex items-center gap-1 shadow-sm">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
                                    <span className="hidden md:inline">{classGroup === '先生モード' ? 'マニュアル' : 'ルール'}</span>
                                </button>
                                {classGroup === '先生モード' && (
                                    <div className="flex gap-2 bg-slate-100 p-1 rounded-lg border border-slate-200">
                                        <select 
                                            className="text-sm font-bold bg-white border border-slate-300 rounded-md px-2 py-1 outline-none focus:ring-2 focus:ring-blue-500 shadow-sm"
                                            value={filterClass} 
                                            onChange={(e) => setFilterClass(e.target.value)}
                                        >
                                            <option value="all">全クラス表示</option>
                                            {CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
                                            <option value="simulation">デモ用</option>
                                        </select>
                                    </div>
                                )}
                            </div>
                        </header>

                        {classGroup === '先生モード' && (
                            <div className="max-w-4xl mx-auto px-4 pb-4">
                                <div className="bg-white rounded-xl p-3 md:p-4 border border-blue-200 shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-3 md:gap-0">
                                    <div className="flex items-center gap-3 w-full md:w-auto overflow-x-auto pb-2 md:pb-0">
                                        <div className="flex items-center gap-2 whitespace-nowrap bg-blue-50 px-3 py-1.5 rounded-lg border border-blue-100">
                                            <span className="font-bold text-sm text-blue-800">⏱ タイマー</span>
                                            <select 
                                                className="text-sm border border-blue-200 rounded px-2 py-1 bg-white focus:ring-2 focus:ring-blue-500 outline-none"
                                                id="timerTarget"
                                            >
                                                <option value="all">全クラス</option>
                                                {CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div className="flex gap-2 shrink-0">
                                            <button onClick={() => startTimer(document.getElementById('timerTarget').value, 5)} className="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-1.5 px-3 rounded shadow-sm transition-colors">5分開始</button>
                                            <button onClick={() => startTimer(document.getElementById('timerTarget').value, 1)} className="bg-blue-500 hover:bg-blue-600 text-white text-xs font-bold py-1.5 px-3 rounded shadow-sm transition-colors">1分開始</button>
                                            <button onClick={() => stopTimer(document.getElementById('timerTarget').value)} className="bg-slate-500 hover:bg-slate-600 text-white text-xs font-bold py-1.5 px-3 rounded shadow-sm transition-colors">停止</button>
                                        </div>
                                    </div>
                                    
                                    <div className="flex gap-2">
                                        <button onClick={handleExportCSV} className="bg-emerald-500 hover:bg-emerald-600 text-white text-sm font-bold py-1 px-2 md:px-3 rounded-lg transition-colors flex items-center gap-1 shadow-sm shrink-0">
                                            CSV
                                        </button>
                                        <button onClick={handleReset} className="bg-red-500 hover:bg-red-600 text-white text-sm font-bold py-1 px-2 md:px-3 rounded-lg transition-colors flex items-center gap-1 shadow-sm shrink-0">
                                            リセット
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className={`w-full text-center font-black transition-colors ${
                            activeTimerClass === 'all' ? 'bg-slate-200 text-slate-600 py-2 md:py-3 text-xl md:text-2xl' :
                            currentTimerState?.isRunning && timeLeft > 0 && timeLeft <= 10000 ? 'bg-red-100 text-red-600 py-2 md:py-3 text-2xl md:text-3xl' :
                            currentTimerState?.isRunning && timeLeft > 10000 ? 'bg-blue-100 text-blue-800 py-2 md:py-3 text-2xl md:text-3xl' :
                            currentTimerState?.isRunning && timeLeft === 0 ? 'bg-red-500 text-white animate-pulse py-2 md:py-3 text-2xl md:text-3xl' :
                            'bg-slate-200 text-slate-600 py-2 md:py-3 text-xl md:text-2xl'
                        }`}>
                            {
                                activeTimerClass === 'all' ? '対象クラスを選択してタイマーを使用' :
                                currentTimerState?.isRunning && timeLeft > 0 ? `残り ${formatTime(timeLeft)}` :
                                currentTimerState?.isRunning && timeLeft === 0 ? '終了！！入力ストップ！' :
                                '待機中（タイマー開始で入力可能になります）'
                            }
                        </div>
                    </div>

                    <main className="max-w-4xl mx-auto p-4 space-y-6 mt-4">
                        <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 md:p-6">
                            <div className="flex flex-col md:flex-row md:justify-between md:items-center mb-6 border-b pb-2 gap-2">
                                <h2 className="text-lg font-bold text-slate-800">
                                    {classGroup === '先生モード' ? (filterClass === 'simulation' ? '📊 デモ' : filterClass === 'all' ? '🏫 学年全体' : `📝 ${filterClass}`) : '🏫 学年全体'} のデータ
                                    <span className="text-slate-400 text-sm ml-2 font-normal">（目標 9：3：3：1）</span>
                                </h2>
                                <span className="font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full text-sm border border-blue-100">総試行回数: {totalTrials} 回</span>
                            </div>

                            <div className="bg-slate-50 rounded-xl p-6 mb-6">
                                <div className="flex h-12 md:h-16 w-full rounded-lg overflow-hidden shadow-inner mb-4">
                                    {totalTrials === 0 ? (
                                        <div className="w-full h-full bg-slate-200 flex items-center justify-center text-slate-400 font-bold text-sm">データがありません</div>
                                    ) : (
                                        <>
                                            <div style={{ width: `${(displayData.AB / totalTrials) * 100}%` }} className="bg-blue-600 transition-all duration-500 flex items-center justify-center overflow-hidden">
                                                {displayData.AB / totalTrials > 0.1 && <span className="text-white font-bold text-xs md:text-sm drop-shadow">AB</span>}
                                            </div>
                                            <div style={{ width: `${(displayData.Ab / totalTrials) * 100}%` }} className="bg-emerald-500 transition-all duration-500 flex items-center justify-center overflow-hidden">
                                                {displayData.Ab / totalTrials > 0.1 && <span className="text-white font-bold text-xs md:text-sm drop-shadow">Ab</span>}
                                            </div>
                                            <div style={{ width: `${(displayData.aB / totalTrials) * 100}%` }} className="bg-amber-400 transition-all duration-500 flex items-center justify-center overflow-hidden">
                                                {displayData.aB / totalTrials > 0.1 && <span className="text-white font-bold text-xs md:text-sm drop-shadow">aB</span>}
                                            </div>
                                            <div style={{ width: `${(displayData.ab / totalTrials) * 100}%` }} className="bg-rose-400 transition-all duration-500 flex items-center justify-center overflow-hidden">

                                        {totalTrials > 0 ? (displayData.Ab / totalTrials * 16).toFixed(1) : '0.0'} :&nbsp;
                                        {totalTrials > 0 ? (displayData.aB / totalTrials * 16).toFixed(1) : '0.0'} :&nbsp;

                            </div>

                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {Object.entries(displayData).map(([key, value]) => {
                                    const labels = {
                                        AB: { name: 'AB', detail: '丸・黄', color: 'text-blue-600', bg: 'bg-blue-50', border: 'border-blue-200', target: 9 },
                                        Ab: { name: 'Ab', detail: '丸・緑', color: 'text-emerald-600', bg: 'bg-emerald-50', border: 'border-emerald-200', target: 3 },
                                        aB: { name: 'aB', detail: 'しわ・黄', color: 'text-amber-600', bg: 'bg-amber-50', border: 'border-amber-200', target: 3 },
                                        ab: { name: 'ab', detail: 'しわ・緑', color: 'text-rose-600', bg: 'bg-rose-50', border: 'border-rose-200', target: 1 }
                                    };
                                    const l = labels[key];
                                    return (
                                        <div key={key} className={`p-4 rounded-xl border-2 ${l.border} ${l.bg} flex flex-col items-center justify-center relative`}>
                                            <div className={`text-xl font-black ${l.color} mb-1`}>{l.name} <span className="text-xs font-bold opacity-70">({l.detail})</span></div>
                                            <div className="text-2xl md:text-3xl font-black text-slate-800">{value} <span className="text-sm md:text-base font-bold text-slate-500">回</span></div>
                                        </div>
                                    );
                                })}
                            </div>

                            {/* ▼ 新規追加: 独立の法則 分析パネル（3:1の再発見） */}
                            {totalTrials > 0 && (
                                <div className="mt-8 border-t border-slate-200 pt-6">
                                    <button 
                                        onClick={() => setShowAnalysis(!showAnalysis)}
                                        className="w-full flex items-center justify-between p-4 bg-slate-800 hover:bg-slate-700 text-white rounded-xl shadow-md transition-colors group"
                                    >
                                        <span className="font-bold flex items-center gap-2">
                                            <span className="text-xl">👁️</span> 独立の法則を分析する（3:1の再発見）
                                        </span>
                                        <span className="text-slate-400 group-hover:text-white transition-colors font-bold">
                                            {showAnalysis ? '▲ 閉じる' : '▼ 開く'}
                                        </span>
                                    </button>

                                    {showAnalysis && (
                                        <div className="mt-4 p-4 md:p-6 bg-slate-50 border border-slate-200 rounded-xl animate-fade-in shadow-inner">
                                            <p className="text-sm font-bold text-slate-600 mb-6 text-center">
                                                「9:3:3:1」のグラフを分解し、1つの形質だけに注目してみると…？
                                            </p>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                                {/* 形（Shape）の分析 */}
                                                <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                                                    <h4 className="text-center font-black text-slate-700 border-b border-slate-200 pb-2 mb-4">形（丸 vs しわ）</h4>
                                                    <div className="flex justify-between items-end mb-3 px-2">
                                                        <div className="text-center">
                                                            <div className="text-xs text-slate-500 font-bold mb-1">丸 <span className="font-normal">(AB+Ab)</span></div>
                                                            <div className="text-2xl font-black text-emerald-600">{roundTotal}</div>
                                                        </div>
                                                        <div className="text-2xl font-black text-slate-300 pb-1">:</div>
                                                        <div className="text-center">
                                                            <div className="text-xs text-slate-500 font-bold mb-1">しわ <span className="font-normal">(aB+ab)</span></div>
                                                            <div className="text-2xl font-black text-emerald-600">{wrinkledTotal}</div>
                                                        </div>
                                                    </div>
                                                    <div className="h-3 bg-slate-200 rounded-full overflow-hidden flex mb-3">
                                                        <div style={{ width: `${(roundTotal / totalTrials) * 100}%` }} className="bg-emerald-500"></div>
                                                        <div style={{ width: `${(wrinkledTotal / totalTrials) * 100}%` }} className="bg-emerald-300"></div>
                                                    </div>
                                                    <div className="text-center">
                                                        <span className="text-xs font-bold text-slate-500 mr-2">比率</span>
                                                        <span className="text-xl font-black tracking-widest text-slate-800">
                                                            {((roundTotal / totalTrials) * 4).toFixed(1)} : {((wrinkledTotal / totalTrials) * 4).toFixed(1)}
                                                        </span>
                                                    </div>
                                                </div>

                                                {/* 色（Color）の分析 */}
                                                <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                                                    <h4 className="text-center font-black text-slate-700 border-b border-slate-200 pb-2 mb-4">色（黄 vs 緑）</h4>
                                                    <div className="flex justify-between items-end mb-3 px-2">
                                                        <div className="text-center">
                                                            <div className="text-xs text-slate-500 font-bold mb-1">黄 <span className="font-normal">(AB+aB)</span></div>
                                                            <div className="text-2xl font-black text-amber-500">{yellowTotal}</div>
                                                        </div>
                                                        <div className="text-2xl font-black text-slate-300 pb-1">:</div>
                                                        <div className="text-center">
                                                            <div className="text-xs text-slate-500 font-bold mb-1">緑 <span className="font-normal">(Ab+ab)</span></div>
                                                            <div className="text-2xl font-black text-amber-500">{greenTotal}</div>
                                                        </div>
                                                    </div>
                                                    <div className="h-3 bg-slate-200 rounded-full overflow-hidden flex mb-3">
                                                        <div style={{ width: `${(yellowTotal / totalTrials) * 100}%` }} className="bg-amber-400"></div>
                                                        <div style={{ width: `${(greenTotal / totalTrials) * 100}%` }} className="bg-amber-200"></div>
                                                    </div>
                                                    <div className="text-center">
                                                        <span className="text-xs font-bold text-slate-500 mr-2">比率</span>
                                                        <span className="text-xl font-black tracking-widest text-slate-800">
                                                            {((yellowTotal / totalTrials) * 4).toFixed(1)} : {((greenTotal / totalTrials) * 4).toFixed(1)}
                                                        </span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="mt-6 text-center bg-white p-3 rounded-lg border border-slate-200 font-bold text-sm text-slate-700">
                                                💡 結論：形も色も、それぞれ独立して「3 : 1」になっている！ <br className="md:hidden"/> <span className="text-blue-600 text-lg ml-2"> (3:1) × (3:1) ＝ 9:3:3:1</span>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </section>

                        {(classGroup !== '先生モード' || filterClass === 'simulation') && (
                            <section className="bg-white rounded-2xl shadow-lg border-2 border-blue-500 p-4 md:p-6 relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-2 bg-blue-500"></div>
                                <div className="flex flex-col md:flex-row md:justify-between md:items-center mb-6 gap-2">
                                    <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                        {classGroup === '先生モード' ? '🎯 デモ 入力パネル' : `🎯 ${classGroup} - ${name} の入力パネル`}
                                    </h2>
                                    <span className="text-sm font-bold text-slate-600 bg-slate-100 px-3 py-1 rounded-full border border-slate-200">自分たちの記録: {myCounts.AB + myCounts.Ab + myCounts.aB + myCounts.ab} 回</span>
                                </div>
                                
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
                                    <div className="space-y-2">
                                        <button 
                                            onClick={() => handleUpdateCount('AB', 1)}
                                            disabled={!isInputAllowed}
                                            className={`w-full py-6 rounded-xl font-black text-2xl md:text-3xl flex flex-col items-center justify-center transition-all transform active:scale-95 shadow-md ${
                                                isInputAllowed ? 'bg-blue-600 text-white hover:bg-blue-700 hover:shadow-lg' : 'bg-slate-300 text-slate-500 cursor-not-allowed opacity-50'
                                            }`}
                                        >
                                            <span>AB</span>
                                            <span className="text-sm font-bold opacity-80 mt-1">丸・黄</span>
                                        </button>
                                        <button onClick={() => handleUpdateCount('AB', -1)} disabled={!isInputAllowed || myCounts.AB === 0} className={`w-full py-2 rounded-lg font-bold transition-colors ${!isInputAllowed || myCounts.AB === 0 ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-slate-200 text-slate-600 hover:bg-slate-300'}`}>－1</button>
                                    </div>
                                    <div className="space-y-2">
                                        <button 
                                            onClick={() => handleUpdateCount('Ab', 1)}
                                            disabled={!isInputAllowed}
                                            className={`w-full py-6 rounded-xl font-black text-2xl md:text-3xl flex flex-col items-center justify-center transition-all transform active:scale-95 shadow-md ${
                                                isInputAllowed ? 'bg-emerald-500 text-white hover:bg-emerald-600 hover:shadow-lg' : 'bg-slate-300 text-slate-500 cursor-not-allowed opacity-50'
                                            }`}
                                        >
                                            <span>Ab</span>
                                            <span className="text-sm font-bold opacity-80 mt-1">丸・緑</span>
                                        </button>
                                        <button onClick={() => handleUpdateCount('Ab', -1)} disabled={!isInputAllowed || myCounts.Ab === 0} className={`w-full py-2 rounded-lg font-bold transition-colors ${!isInputAllowed || myCounts.Ab === 0 ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-slate-200 text-slate-600 hover:bg-slate-300'}`}>－1</button>
                                    </div>
                                    <div className="space-y-2">
                                        <button 
                                            onClick={() => handleUpdateCount('aB', 1)}
                                            disabled={!isInputAllowed}
                                            className={`w-full py-6 rounded-xl font-black text-2xl md:text-3xl flex flex-col items-center justify-center transition-all transform active:scale-95 shadow-md ${
                                                isInputAllowed ? 'bg-amber-500 text-white hover:bg-amber-600 hover:shadow-lg' : 'bg-slate-300 text-slate-500 cursor-not-allowed opacity-50'
                                            }`}
                                        >
                                            <span>aB</span>
                                            <span className="text-sm font-bold opacity-80 mt-1">しわ・黄</span>
                                        </button>
                                        <button onClick={() => handleUpdateCount('aB', -1)} disabled={!isInputAllowed || myCounts.aB === 0} className={`w-full py-2 rounded-lg font-bold transition-colors ${!isInputAllowed || myCounts.aB === 0 ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-slate-200 text-slate-600 hover:bg-slate-300'}`}>－1</button>
                                    </div>
                                    <div className="space-y-2">
                                        <button 
                                            onClick={() => handleUpdateCount('ab', 1)}
                                            disabled={!isInputAllowed}
                                            className={`w-full py-6 rounded-xl font-black text-2xl md:text-3xl flex flex-col items-center justify-center transition-all transform active:scale-95 shadow-md ${
                                                isInputAllowed ? 'bg-rose-500 text-white hover:bg-rose-600 hover:shadow-lg' : 'bg-slate-300 text-slate-500 cursor-not-allowed opacity-50'
                                            }`}
                                        >
                                            <span>ab</span>
                                            <span className="text-sm font-bold opacity-80 mt-1">しわ・緑</span>
                                        </button>
                                        <button onClick={() => handleUpdateCount('ab', -1)} disabled={!isInputAllowed || myCounts.ab === 0} className={`w-full py-2 rounded-lg font-bold transition-colors ${!isInputAllowed || myCounts.ab === 0 ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-slate-200 text-slate-600 hover:bg-slate-300'}`}>－1</button>
                                    </div>
                                </div>
                            </section>
                        )}

                        <section className="bg-slate-50 rounded-xl p-4 border border-slate-200 shadow-inner">
                            <div className="flex justify-between items-center mb-4 border-b border-slate-200 pb-2">
                                <h3 className="text-sm font-bold text-slate-700 flex items-center gap-2">
                                    🏆 {classGroup === '先生モード' ? (filterClass === 'simulation' ? 'デモ データ' : filterClass === 'all' ? '学年全体 ランキング' : `${filterClass} ランキング`) : `ランキング`}
                                </h3>
                                <div className="flex gap-3 text-xs font-bold text-slate-500">
                                    <span className="flex items-center gap-1"><span className="bg-yellow-400 text-white px-1.5 py-0.5 rounded text-[10px]">TOP</span> トップ</span>
                                </div>
                            </div>
                            
                            <ul className="space-y-2 max-h-[400px] md:max-h-[600px] overflow-y-auto pr-2 custom-scrollbar">
                                {sortedData.map((team, index) => {
                                    const teamTotal = team.AB + team.Ab + team.aB + team.ab;
                                    const isExpanded = expandedTeamId === team.id;
                                    return (
                                        <li key={team.id} className="bg-white p-3 rounded-lg shadow-sm border border-slate-100 flex flex-col">
                                            <div className="flex justify-between items-center">
                                                <div className="flex items-center gap-2 md:gap-3">
                                                    <div className={`w-6 h-6 md:w-8 md:h-8 rounded-full flex items-center justify-center font-bold text-xs md:text-sm ${
                                                        index === 0 ? 'bg-yellow-100 text-yellow-600 border border-yellow-200' :
                                                        index === 1 ? 'bg-slate-100 text-slate-500 border border-slate-200' :
                                                        index === 2 ? 'bg-amber-100 text-amber-700 border border-amber-200' :
                                                        'bg-slate-50 text-slate-400'
                                                    }`}>
                                                        {index + 1}
                                                    </div>
                                                    <div className="flex flex-col">
                                                        <span className="font-bold text-slate-800 text-sm md:text-base">{team.name}</span>
                                                        {classGroup === '先生モード' && filterClass === 'all' && team.className && (
                                                            <span className="text-[10px] md:text-xs text-slate-500">{team.className}</span>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-2 md:gap-3">
                                                    <span className="font-bold text-slate-700 text-sm md:text-base">{teamTotal} 回</span>
                                                    {classGroup === '先生モード' && (
                                                        <>
                                                            <button 
                                                                onClick={() => setExpandedTeamId(isExpanded ? null : team.id)}
                                                                className="text-[10px] md:text-xs bg-blue-50 hover:bg-blue-100 border border-blue-200 text-blue-700 px-2 py-1 rounded transition-colors font-bold whitespace-nowrap"
                                                            >
                                                                {isExpanded ? '▲ 閉じる' : '▼ 詳細'}
                                                            </button>
                                                            <button onClick={() => handleDelete(team.id)} className="w-6 h-6 bg-red-100 text-red-600 rounded-full hover:bg-red-200 flex items-center justify-center font-bold text-xs transition-colors shrink-0">✕</button>
                                                        </>
                                                    )}
                                                </div>
                                            </div>

                                            {classGroup === '先生モード' && isExpanded && (
                                                <div className="mt-3 p-3 bg-slate-50 border border-slate-200 rounded-lg text-xs text-slate-700 animate-fade-in shadow-inner">
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                        <div>
                                                            <h4 className="font-bold text-blue-700 border-b border-blue-200 pb-1 mb-2">データ内訳（計 {teamTotal}回）</h4>
                                                            <ul className="space-y-1 font-medium">
                                                                <li className="flex justify-between"><span>[AB] 丸・黄:</span> <span>{team.AB} 回</span></li>
                                                                <li className="flex justify-between"><span>[Ab] 丸・緑:</span> <span>{team.Ab} 回</span></li>
                                                                <li className="flex justify-between"><span>[aB] しわ・黄:</span> <span>{team.aB} 回</span></li>
                                                                <li className="flex justify-between"><span>[ab] しわ・緑:</span> <span>{team.ab} 回</span></li>
                                                            </ul>
                                                        </div>
                                                        <div>
                                                            <h4 className="font-bold text-blue-700 border-b border-blue-200 pb-1 mb-2">比率（合計16換算）</h4>
                                                            <div className="font-medium">
                                                                <span className="text-slate-500 block mb-1">表現型 [AB] : [Ab] : [aB] : [ab]</span>
                                                                <div className="text-sm font-black text-slate-800 bg-white p-2 rounded border border-slate-200 text-center tracking-widest">
                                                                    {teamTotal > 0 ? (team.AB / teamTotal * 16).toFixed(1) : '0.0'} : {teamTotal > 0 ? (team.Ab / teamTotal * 16).toFixed(1) : '0.0'} : {teamTotal > 0 ? (team.aB / teamTotal * 16).toFixed(1) : '0.0'} : {teamTotal > 0 ? (team.ab / teamTotal * 16).toFixed(1) : '0.0'}
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </li>
                                    );
                                })}
                            </ul>
                        </section>
                    </main>

                    {showHelp && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-white rounded-2xl p-6 max-w-lg w-full max-h-[90vh] overflow-y-auto relative shadow-2xl">
                                <button onClick={() => setShowHelp(false)} className="absolute top-4 right-4 w-8 h-8 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 font-bold flex items-center justify-center">✕</button>
                                
                                {classGroup === '先生モード' ? (
                                    <>
                                        <h2 className="text-xl font-bold text-slate-800 mb-4 border-b border-blue-200 pb-2">先生モード 機能マニュアル</h2>
                                        <div className="space-y-4 text-sm text-slate-700">
                                            <ul className="space-y-3">
                                                <li><b className="text-blue-600">クラス個別タイマー＆入力制限</b><br/>選択した「対象クラス」の生徒に対してのみタイマーが発動します。また、<b>生徒はタイマーが動いている時間帯しかデータを入力できなくなります。</b></li>
                                                <li><b className="text-blue-600">対象クラスの切り替え</b><br/>グラフやランキングを「学年全体」「各クラス」「デモ」に切り替えられます。</li>
                                                <li><b className="text-blue-600">CSVダウンロード / リセット</b><br/>現在表示している対象クラスのデータを処理します。</li>
                                                <li><b className="text-blue-600">強制ログアウト（キック）＆ 各班の詳細データ</b><br/>各班の「▼詳細」を押すと生データと比率が表示されます。「✕」ボタンを押すとその班のデータを消去し強制ログアウトさせます。</li>
                                                <li><b className="text-blue-600">独立の法則 分析パネル</b><br/>メイン画面の「👁️ 独立の法則を分析する」ボタンを押すと、9:3:3:1のデータを「形（3:1）」と「色（3:1）」に分解して自動計算し、スクリーンで生徒に提示できます。</li>
                                                <li><b className="text-blue-600">ポータルとカードメーカー</b><br/><a href="./index.html" className="text-blue-500 underline hover:text-blue-700" target="_blank" rel="noopener noreferrer">デジタル教材ポータル</a>からアクセス可能です。</li>
                                            </ul>
                                        </div>
                                    </>
                                ) : (
                                    <>
                                        <h2 className="text-xl font-bold text-slate-800 mb-4 border-b border-blue-200 pb-2">📖 実験のルール</h2>
                                        <div className="space-y-4 text-sm text-slate-700">
                                            <h3 className="font-bold text-blue-600 text-base">独立の法則 9 : 3 : 3 : 1 を確かめよう!</h3>
                                            <ol className="list-decimal pl-5 space-y-3">
                                                <li><b>♂役と♀役を決め、それぞれAB, Ab, aB, ab の4枚のカード</b>を裏向きにして持ち、相手に見えないようにシャッフルする。</li>
                                                <li>互いに相手の手札から、1枚ずつカードを引く。</li>
                                                <li>引いた2枚のカードを組み合わせて、<b>表現型（丸・黄など）</b>を確認する。
                                                    <ul className="list-disc pl-5 mt-2 space-y-1 text-slate-600 font-medium">
                                                        <li><b>[AB]（丸・黄）</b>　←遺伝子型：<b>A_B_</b></li>
                                                        <li><b>[Ab]（丸・緑）</b>　←遺伝子型：<b>A_bb</b></li>
                                                        <li><b>[aB]（しわ・黄）</b>←遺伝子型：<b>aaB_</b></li>
                                                        <li><b>[ab]（しわ・緑）</b>←遺伝子型：<b>aabb</b></li>
                                                    </ul>
                                                </li>
                                                <li>代表者が、対応する表現型の<b>ボタン</b>を1回タップして入力する。<br/>
                                                    <span className="text-xs text-slate-500 font-bold">※間違えて押してしまったら、下のマイナスを押して消す。</span>
                                                </li>
                                                <li>引いたカードを戻して再度シャッフルし、2〜5を繰り返す。<br/>
                                                    <span className="text-xs text-blue-600 font-bold">（1つの班で何回やってもOK！たくさんデータを集めよう）</span>
                                                </li>
                                            </ol>
                                        </div>
                                    </>
                                )}
                                
                                <div className="mt-6 text-center">
                                    <button onClick={() => setShowHelp(false)} className="bg-slate-800 hover:bg-slate-700 text-white font-bold py-2 px-8 rounded-lg shadow-sm">閉じる</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
