<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二遺伝子雑種 LIVE集計</title>
    <!-- Tailwind CSS (スタイリング) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (UI構築) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (ブラウザ上でJSXを変換) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- Babel設定 -->
    <script>
        Babel.registerPreset('react-classic', {
            presets: [
                [Babel.availablePresets['react'], { "runtime": "classic" }]
            ]
        });
    </script>

    <!-- アプリケーションのコード -->
    <script type="text/babel" data-type="module" data-presets="react-classic">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const { useState, useEffect, useMemo } = React;

        // 環境判定
        const isCanvasEnv = typeof __firebase_config !== 'undefined' && typeof __app_id !== 'undefined';

        // 先生のFirebase設定情報
        const myFirebaseConfig = {
            apiKey: "AIzaSyCar5BfWLpkeMZY3CvQXWPafMcy7-3j0Ao",
            authDomain: "mendelapp-e8546.firebaseapp.com",
            projectId: "mendelapp-e8546",
            storageBucket: "mendelapp-e8546.firebasestorage.app",
            messagingSenderId: "440177963313",
            appId: "1:440177963313:web:4a022fa480f2217aeb0010"
        };

        const firebaseConfig = isCanvasEnv ? JSON.parse(__firebase_config) : myFirebaseConfig;
        const currentAppId = isCanvasEnv ? __app_id : "matsumoto-mendel-2"; 

        // Firebaseの初期化
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 定数設定（二遺伝子雑種の表現型） ---
        const PHENOTYPES = [
            { id: 'AB', label: '[AB]', name: '丸・黄', target: 9, 
              btnColor: 'bg-amber-100 hover:bg-amber-200 text-amber-900 border-amber-300', 
              barColor: 'bg-amber-400' },
            { id: 'Ab', label: '[Ab]', name: '丸・緑', target: 3, 
              btnColor: 'bg-emerald-100 hover:bg-emerald-200 text-emerald-900 border-emerald-300', 
              barColor: 'bg-emerald-500' },
            { id: 'aB', label: '[aB]', name: 'しわ・黄', target: 3, 
              btnColor: 'bg-orange-100 hover:bg-orange-200 text-orange-900 border-orange-300', 
              barColor: 'bg-orange-400' },
            { id: 'ab', label: '[ab]', name: 'しわ・緑', target: 1, 
              btnColor: 'bg-slate-100 hover:bg-slate-200 text-slate-800 border-slate-300', 
              barColor: 'bg-slate-400' },
        ];

        // クラスの選択肢
        const CLASS_LIST = ['A組', 'B組', 'C組', 'D組', 'E組', 'F組', 'G組', 'H組', '先生モード'];

        function App() {
            const [user, setUser] = useState(null);
            const [classGroup, setClassGroup] = useState('A組'); // 新設：クラス名
            const [name, setName] = useState(''); 
            const [isNameSet, setIsNameSet] = useState(false);
            const [myCounts, setMyCounts] = useState({ AB: 0, Ab: 0, aB: 0, ab: 0 });
            const [allData, setAllData] = useState([]);
            const [error, setError] = useState(null);
            
            // 新設：集計ダッシュボードの表示フィルタ
            const [filterClass, setFilterClass] = useState('all');

            // 1. 認証プロセス
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (isCanvasEnv && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        console.error("認証エラー詳細:", e);
                        setError(`認証エラー: ${e.message}`);
                    }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // 2. リアルタイム同期
            useEffect(() => {
                if (!user) return;

                const dataRef = collection(db, 'artifacts', currentAppId, 'public', 'data', 'mendel_dihybrid_data');
                const q = query(dataRef);

                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const data = [];
                    snapshot.forEach((doc) => {
                        data.push({ id: doc.id, ...doc.data() });
                    });
                    
                    // クラス名 → 班名の順でソート
                    data.sort((a, b) => {
                        if (a.classGroup !== b.classGroup) return (a.classGroup || '').localeCompare(b.classGroup || '');
                        return (a.name || '').localeCompare(b.name || '');
                    });
                    setAllData(data);

                    // リロード時のデータ復元
                    if (!isNameSet) {
                        const myDoc = data.find(d => d.id === user.uid);
                        if (myDoc && myDoc.name) {
                            setClassGroup(myDoc.classGroup || 'A組');
                            setName(myDoc.name);
                            setMyCounts({ AB: myDoc.AB || 0, Ab: myDoc.Ab || 0, aB: myDoc.aB || 0, ab: myDoc.ab || 0 });
                            setIsNameSet(true);
                        }
                    }
                }, (err) => {
                    console.error("同期エラー:", err);
                    setError("データの読み込み権限がありません。");
                });
                return () => unsubscribe();
            }, [user, isNameSet]);

            // 3. データの書き込み（クラス名も追加）
            const updateDB = async (newCounts, currentClassGroup, currentName) => {
                if (!user) return;
                try {
                    const docRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'mendel_dihybrid_data', user.uid);
                    await setDoc(docRef, {
                        classGroup: currentClassGroup,
                        name: currentName,
                        ...newCounts,
                        updatedAt: new Date().toISOString()
                    }, { merge: true });
                } catch (e) {
                    console.error("エラー:", e);
                    alert("データ保存に失敗しました。");
                }
            };

            const handleIncrement = (type) => {
                const newCounts = { ...myCounts, [type]: myCounts[type] + 1 };
                setMyCounts(newCounts);
                updateDB(newCounts, classGroup, name);
            };

            const handleDecrement = (type) => {
                if (myCounts[type] > 0) {
                    const newCounts = { ...myCounts, [type]: myCounts[type] - 1 };
                    setMyCounts(newCounts);
                    updateDB(newCounts, classGroup, name);
                }
            };

            const handleJoin = (e) => {
                e.preventDefault();
                if (classGroup === '先生モード') {
                    setIsNameSet(true);
                    setName('先生');
                    updateDB(myCounts, '先生モード', '先生');
                    setFilterClass('all'); // 先生はデフォルトで全体表示
                } else if (name.trim()) {
                    setIsNameSet(true);
                    updateDB(myCounts, classGroup, name.trim());
                    // 参加したクラスを自分の画面の初期フィルタに設定する
                    setFilterClass(classGroup);
                }
            };

            // --- 新設：先生用リセット機能 ---
            const handleReset = async () => {
                const targetName = filterClass === 'all' ? '学年全体の全クラス' : filterClass;
                if (!confirm(`本当に「${targetName}」のデータをすべて削除して 0 に戻しますか？\n（※この操作は取り消せません）`)) return;
                try {
                    const targets = filterClass === 'all' ? allData : allData.filter(d => d.classGroup === filterClass);
                    for (const d of targets) {
                        await deleteDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'mendel_dihybrid_data', d.id));
                    }
                    alert(`${targetName} のデータをリセットしました。`);
                } catch (e) {
                    console.error("削除エラー:", e);
                    alert("データの削除に失敗しました。");
                }
            };

            // --- 集計ロジック（フィルタリング対応） ---
            const filteredData = useMemo(() => {
                if (filterClass === 'all') return allData;
                return allData.filter(d => d.classGroup === filterClass);
            }, [allData, filterClass]);

            const totals = useMemo(() => {
                return filteredData.reduce((acc, curr) => ({
                    AB: acc.AB + (curr.AB || 0),
                    Ab: acc.Ab + (curr.Ab || 0),
                    aB: acc.aB + (curr.aB || 0),
                    ab: acc.ab + (curr.ab || 0)
                }), { AB: 0, Ab: 0, aB: 0, ab: 0 });
            }, [filteredData]);

            const totalTrials = totals.AB + totals.Ab + totals.aB + totals.ab;
            const maxCount = Math.max(totals.AB, totals.Ab, totals.aB, totals.ab, 1);

            const getRatio = (count) => {
                return totals.ab > 0 ? (count / totals.ab).toFixed(1) : '-';
            };

            if (error) return <div className="min-h-screen flex items-center justify-center text-red-500 font-bold px-4 text-center">{error}</div>;
            if (!user) return <div className="min-h-screen flex items-center justify-center text-slate-500 font-bold">システムに接続中...</div>;

            // ログイン（参加）画面
            if (!isNameSet) {
                return (
                    <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border-t-8 border-blue-600">
                            <h1 className="text-2xl font-bold text-center text-slate-800 mb-2">二遺伝子雑種 LIVE集計</h1>
                            <p className="text-center text-slate-500 mb-6 text-sm">自分のクラスと班名を入力してください</p>
                            <form onSubmit={handleJoin} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-1">クラス</label>
                                    <select 
                                        value={classGroup} 
                                        onChange={(e) => setClassGroup(e.target.value)}
                                        className="w-full px-4 py-3 rounded-lg border-2 border-slate-200 focus:border-blue-500 outline-none font-bold text-slate-700 bg-white"
                                    >
                                        {CLASS_LIST.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                {classGroup !== '先生モード' && (
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">班の名前</label>
                                        <input
                                            type="text"
                                            value={name}
                                            onChange={(e) => setName(e.target.value)}
                                            placeholder="例：1班、松本ペア"
                                            className="w-full px-4 py-3 rounded-lg border-2 border-slate-200 focus:border-blue-500 outline-none font-bold text-slate-700"
                                            required
                                        />
                                    </div>
                                )}
                                <button type="submit" className={`w-full ${classGroup === '先生モード' ? 'bg-slate-700 hover:bg-slate-800' : 'bg-blue-600 hover:bg-blue-700'} text-white font-bold py-3 rounded-lg transition-colors mt-4`}>
                                    {classGroup === '先生モード' ? '管理者として入室' : '実験スタート'}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            // メイン画面
            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-slate-800 text-white p-4 sticky top-0 z-20 shadow-md">
                        <div className="max-w-4xl mx-auto flex flex-col md:flex-row md:justify-between md:items-center gap-3">
                            <h1 className="font-bold text-lg flex items-center gap-2">
                                <i className="lucide-activity text-blue-400"></i>
                                LIVE集計：二遺伝子雑種
                            </h1>
                            
                            {/* クラス表示フィルタとリセットボタン */}
                            <div className="flex flex-col sm:flex-row items-center gap-2">
                                <div className="flex items-center gap-2 bg-slate-700 p-1 pl-3 rounded-lg text-sm">
                                    <span className="font-bold text-slate-300">集計対象:</span>
                                    <select 
                                        value={filterClass}
                                        onChange={(e) => setFilterClass(e.target.value)}
                                        className="bg-slate-600 text-white font-bold py-1 px-2 rounded outline-none border border-slate-500 focus:border-blue-400 cursor-pointer"
                                    >
                                        <option value="all">学年全体（すべて）</option>
                                        {CLASS_LIST.filter(c => c !== '先生モード').map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                {classGroup === '先生モード' && (
                                    <button onClick={handleReset} className="bg-red-500 hover:bg-red-600 text-white text-sm font-bold py-1 px-3 rounded-lg transition-colors flex items-center gap-1 shadow-sm">
                                        データリセット
                                    </button>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 space-y-6 mt-4">
                        {/* グラフエリア */}
                        <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 md:p-6">
                            <div className="flex flex-col md:flex-row md:justify-between md:items-center mb-6 border-b pb-2 gap-2">
                                <h2 className="text-lg font-bold text-slate-800">
                                    {filterClass === 'all' ? '🏫 学年全体' : `📝 ${filterClass}`} のデータ
                                    <span className="text-slate-400 text-sm ml-2 font-normal">（目標 9：3：3：1）</span>
                                </h2>
                                <span className="font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full text-sm border border-blue-100">
                                    総試行回数: {totalTrials} 回
                                </span>
                            </div>

                            <div className="bg-slate-50 rounded-xl p-6 mb-6">
                                <div className="flex h-56 items-end gap-2 md:gap-4 relative">
                                    <div className="absolute inset-0 flex flex-col justify-between pointer-events-none opacity-10">
                                        <div className="border-b border-slate-800 w-full h-0"></div>
                                        <div className="border-b border-slate-800 w-full h-0"></div>
                                        <div className="border-b border-slate-800 w-full h-0"></div>
                                        <div className="border-b border-slate-800 w-full h-0"></div>
                                    </div>

                                    {PHENOTYPES.map((p) => {
                                        const count = totals[p.id];
                                        const heightPct = maxCount === 0 ? 0 : (count / maxCount) * 100;
                                        const ratio = p.id === 'ab' ? '1.0' : getRatio(count);
                                        
                                        return (
                                            <div key={p.id} className="flex-1 flex flex-col items-center gap-2 h-full z-10">
                                                <div className="text-xs md:text-sm font-bold text-slate-600 bg-white px-2 py-0.5 rounded shadow-sm border border-slate-100">
                                                    比: {ratio}
                                                </div>
                                                <div className="w-full max-w-[80px] bg-slate-200 rounded-t-md relative flex-1 flex items-end overflow-hidden shadow-inner">
                                                    <div 
                                                        className={`w-full ${p.barColor} transition-all duration-700 ease-out flex items-start justify-center pt-2`}
                                                        style={{ height: `${heightPct}%` }}
                                                    >
                                                        {heightPct > 15 && (
                                                            <span className="text-white font-bold text-xs shadow-sm">{count}</span>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="flex gap-2 md:gap-4 mt-3">
                                    {PHENOTYPES.map(p => (
                                        <div key={p.id} className="flex-1 text-center">
                                            <div className="font-bold text-slate-800 text-sm md:text-base">{p.label}</div>
                                            <div className="text-xs text-slate-500">{p.name}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="flex justify-center items-center gap-2 md:gap-4 text-center">
                                {PHENOTYPES.map((p, index) => (
                                    <React.Fragment key={p.id}>
                                        <div className="flex flex-col items-center">
                                            <span className={`text-xl md:text-3xl font-black ${p.id === 'ab' ? 'text-slate-400' : 'text-blue-600'}`}>
                                                {p.id === 'ab' ? '1.0' : getRatio(totals[p.id])}
                                            </span>
                                            <span className="text-xs text-slate-400 mt-1 font-bold">目標: {p.target}</span>
                                        </div>
                                        {index < 3 && <span className="text-2xl font-bold text-slate-200 pb-4">:</span>}
                                    </React.Fragment>
                                ))}
                            </div>
                        </section>

                        {/* コントローラー (自分の入力パネル) */}
                        <section className="bg-white rounded-2xl shadow-lg border-2 border-blue-500 p-4 md:p-6 relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-2 bg-blue-500"></div>
                            <div className="flex flex-col md:flex-row md:justify-between md:items-center mb-6 gap-2">
                                <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                    🎯 {classGroup} - {name} の入力パネル
                                </h2>
                                <span className="text-sm font-bold text-slate-600 bg-slate-100 px-3 py-1 rounded-full border border-slate-200">
                                    自分たちの記録: {myCounts.AB + myCounts.Ab + myCounts.aB + myCounts.ab} 回
                                </span>
                            </div>
                            
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
                                {PHENOTYPES.map((p) => (
                                    <div key={p.id} className="flex flex-col gap-2">
                                        <button 
                                            onClick={() => handleIncrement(p.id)}
                                            className={`${p.btnColor} border-2 rounded-xl p-4 flex flex-col items-center justify-center transition-all active:scale-95 shadow-sm min-h-[100px]`}
                                        >
                                            <span className="text-2xl font-bold">＋ {p.label}</span>
                                            <span className="text-xs font-bold opacity-80 mt-1">{p.name}</span>
                                        </button>
                                        <div className="flex items-center justify-between bg-slate-50 rounded-lg p-2 border border-slate-200">
                                            <button 
                                                onClick={() => handleDecrement(p.id)} 
                                                className="w-8 h-8 flex items-center justify-center bg-white border border-slate-200 rounded text-slate-400 hover:text-red-500 hover:border-red-200 transition-colors font-bold shadow-sm"
                                                title="1つ減らす"
                                            >
                                                －
                                            </button>
                                            <span className="font-bold text-xl text-slate-700">{myCounts[p.id]}</span>
                                            <div className="w-8"></div> {/* バランス調整用スペーサー */}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* クラスごとの班リスト */}
                        <section className="bg-slate-50 rounded-xl p-4 border border-slate-200">
                            <div className="flex justify-between items-center mb-4 border-b border-slate-200 pb-2">
                                <h3 className="text-sm font-bold text-slate-600">
                                    👥 {filterClass === 'all' ? '全クラスの状況' : `${filterClass}の状況`}
                                </h3>
                                <span className="text-xs font-bold text-slate-400">表示中: {filteredData.length}班</span>
                            </div>
                            
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                {filteredData.length === 0 ? (
                                    <div className="col-span-full text-center text-slate-400 text-sm py-4">データがありません</div>
                                ) : (
                                    filteredData.map(d => (
                                        <div key={d.id} className={`p-3 rounded-lg text-sm border shadow-sm ${d.id === user?.uid ? 'bg-blue-50 border-blue-300 ring-1 ring-blue-200' : 'bg-white border-slate-200'}`}>
                                            <div className="text-xs font-bold text-blue-500 mb-0.5">{d.classGroup}</div>
                                            <div className="font-bold text-slate-700 truncate mb-1">{d.name}</div>
                                            <div className="text-xs font-bold text-slate-500 bg-slate-100 rounded px-2 py-1 inline-block">
                                                計 {(d.AB || 0) + (d.Ab || 0) + (d.aB || 0) + (d.ab || 0)} 回
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </section>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
