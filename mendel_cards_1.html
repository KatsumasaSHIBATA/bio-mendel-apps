<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一遺伝子雑種 TCG風カードメーカー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @media print {
            body { background: white; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .page-break-after-always { page-break-after: always; break-after: page; box-shadow: none !important; margin: 0 !important; background: transparent !important; }
            @page { size: A4 landscape; margin: 0; }
        }
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Sans+JP:wght@500;700;900&display=swap');
        .font-tcg { font-family: 'Cinzel', serif; }
        .font-jp { font-family: 'Noto Sans JP', sans-serif; }
    </style>
</head>
<body class="bg-slate-200 min-h-screen font-jp pb-20">
    <div id="root"></div>

    <script>
        Babel.registerPreset('react-classic', {
            presets: [
                [Babel.availablePresets['react'], { "runtime": "classic" }]
            ]
        });
    </script>

    <script type="text/babel" data-type="module" data-presets="react-classic">
        const { useState } = React;

        const SVG_DNA = (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full text-current">
                <path d="M2 15c6.667-6 13.333 0 20-6"/><path d="M9 22c1.798-1.598 3-4.111 3-7.5S10.798 8.598 9 7"/><path d="M15 2c-1.798 1.598-3 4.111-3 7.5S13.202 15.402 15 17"/><path d="m17 17-2.5-2.5"/><path d="m14 8-1.5-1.5"/><path d="m7 17 2.5-2.5"/><path d="m10 8 1.5-1.5"/>
            </svg>
        );

        // ▼ 変更：遺伝子の種類（A/a）によって、アプリのグラフと色をリンクさせる！
        const ChromosomeMono = ({ gene }) => {
            const color = gene === 'A' ? '#10b981' : '#3b82f6'; // A=エメラルド, a=ブルー
            return (
                <svg viewBox="0 0 80 160" className="z-10" style={{ width: '15mm', height: '30mm' }}>
                    <rect x="25" y="10" width="30" height="140" rx="15" fill={color} stroke="#fff" strokeWidth="2" />
                    <rect x="26" y="35" width="28" height="26" fill="#ffffff" />
                    <text x="40" y="55" fontSize="24" fontWeight="900" fontFamily="'Cinzel', serif" textAnchor="middle" fill={color}>{gene}</text>
                </svg>
            );
        };

        const Cell = ({ children }) => (
            <div className="relative box-border border border-dashed border-slate-300 print:border-none"
                 style={{ width: '54mm', height: '86mm' }}>
                {children}
            </div>
        );

        const CardContainer = ({ children }) => (
            <div className={`relative box-border bg-white`}
                 style={{ width: '54mm', height: '86mm' }}>
                {children}
            </div>
        );

        const GeneCard = ({ gender, genes }) => {
            const isMale = gender === '♂';
            const bgClass = isMale ? 'bg-blue-50' : 'bg-pink-50';
            const borderClass = isMale ? 'border-blue-400' : 'border-pink-400';
            const textColor = isMale ? 'text-blue-800' : 'text-pink-800';

            // ▼ 変更：背景の豆の絵（SVG）を完全に削除しました
            return (
                <CardContainer>
                    <div className={`absolute rounded-lg border-[2mm] ${borderClass} ${bgClass} flex flex-col items-center justify-center box-border overflow-hidden`}
                         style={{ top: '2mm', left: '2mm', width: '50mm', height: '82mm' }}>

                        {/* ▼ 変更：四隅のインデックス（♂♀とA/a）の文字サイズを大幅に拡大！ */}
                        <div className={`absolute top-1.5 left-2 flex flex-col items-center ${textColor}`}>
                            <span className="font-bold leading-none mb-0.5" style={{ fontSize: '12px' }}>{gender}</span>
                            <span className="font-tcg font-black leading-none" style={{ fontSize: '16px' }}>{genes}</span>
                        </div>

                        <div className={`absolute bottom-1.5 right-2 flex flex-col items-center rotate-180 ${textColor}`}>
                            <span className="font-bold leading-none mb-0.5" style={{ fontSize: '12px' }}>{gender}</span>
                            <span className="font-tcg font-black leading-none" style={{ fontSize: '16px' }}>{genes}</span>
                        </div>

                        <div className="z-10 flex flex-col items-center mb-1 mt-2">
                            <ChromosomeMono gene={genes} />
                        </div>
                    </div>
                </CardContainer>
            );
        };

        const PairCard = () => (
            <CardContainer>
                <div className="absolute rounded-lg border-[2mm] border-slate-700 bg-slate-100 flex flex-col items-center justify-start p-2 box-border overflow-hidden"
                     style={{ top: '2mm', left: '2mm', width: '50mm', height: '82mm' }}>
                    <div className="font-tcg font-bold text-slate-500 mt-1 flex-shrink-0" style={{ fontSize: '8px' }}>MENDEL TCG</div>
                    <div className="my-1 text-slate-400 flex-shrink-0" style={{ width: '24px', height: '24px' }}>{SVG_DNA}</div>
                    <h2 className="font-black text-slate-800 mb-1 text-center leading-tight flex-shrink-0" style={{ fontSize: '11px', width: '100%' }}>
                        ペアの名前 / No.
                    </h2>
                    <div className="w-full border-t border-slate-300 my-1 flex-shrink-0"></div>
                    <div className="mt-4 flex flex-col items-center w-full px-1">
                        <div className="bg-white border-2 border-slate-400 shadow-inner w-full" style={{ height: '15mm' }}></div>
                    </div>
                </div>
            </CardContainer>
        );

        const BackCard = ({ gender, type }) => {
            let borderColor = 'border-slate-300';
            let markColor = ''; 
            let mark = '';
            
            if (type === 'pair') {
                borderColor = 'border-slate-700'; // ペアNoの裏枠もグレーに統一
            } else if (gender === '♂') {
                borderColor = 'border-blue-500';
                markColor = 'text-blue-200';
                mark = '♂';
            } else if (gender === '♀') {
                borderColor = 'border-rose-500';
                markColor = 'text-rose-200';
                mark = '♀';
            }

            return (
                <CardContainer>
                    <div className={`absolute top-0 left-0 w-full h-full bg-white border-[3mm] ${borderColor} flex flex-col items-center justify-center overflow-hidden`}
                         style={{ width: '54mm', height: '86mm', boxSizing: 'border-box' }}>
                        {mark && (
                            <div className={`absolute inset-0 flex items-center justify-center ${markColor} pointer-events-none`}>
                                <span className="font-jp font-black" style={{ fontSize: '100px', lineHeight: 1 }}>{mark}</span>
                            </div>
                        )}
                    </div>
                </CardContainer>
            );
        };

        const A4Page = ({ children }) => (
            <div className="bg-white shadow-xl page-break-after-always mx-auto mb-10 print:shadow-none print:mx-0 print:mb-0 box-border relative overflow-hidden"
                 style={{ width: '297mm', height: '210mm' }}>
                {React.Children.map(children, (child, index) => {
                    if (!child) return null;
                    const col = index % 5; 
                    const row = Math.floor(index / 5); 
                    const left = 13.5 + col * 54; 
                    const top = 19 + row * 86; 
                    return (
                        <div style={{ position: 'absolute', left: `${left}mm`, top: `${top}mm`, width: '54mm', height: '86mm' }}>
                            {child}
                        </div>
                    );
                })}
            </div>
        );

        function App() {
            const monoCards = [
                { type: 'gene', gender: '♂', genes: 'A' },
                { type: 'gene', gender: '♂', genes: 'a' },
                { type: 'gene', gender: '♀', genes: 'A' },
                { type: 'gene', gender: '♀', genes: 'a' },
                { type: 'gene', gender: '♂', genes: 'A' },
                { type: 'gene', gender: '♂', genes: 'a' },
                { type: 'gene', gender: '♀', genes: 'A' },
                { type: 'gene', gender: '♀', genes: 'a' },
                { type: 'pair' },
                { type: 'pair' }
            ];

            const renderFront = (cards) => {
                return cards.map((c, i) => (
                    <Cell key={`front-${i}`}>
                        {c.type === 'pair' ? (
                            <PairCard />
                        ) : (
                            <GeneCard gender={c.gender} genes={c.genes} />
                        )}
                    </Cell>
                ));
            };

            const renderBack = (cards) => {
                const backs = [];
                for (let i = 0; i < 2; i++) {
                    const row = cards.slice(i * 5, i * 5 + 5).reverse();
                    backs.push(...row);
                }
                return backs.map((c, i) => (
                    <Cell key={`back-${i}`}>
                        <BackCard gender={c.gender} type={c.type} />
                    </Cell>
                ));
            };

            return (
                <div>
                    <div className="no-print bg-slate-800 text-white p-4 sticky top-0 z-50 shadow-md">
                        <div className="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <h1 className="text-lg md:text-xl font-bold flex items-center gap-2">
                                <span className="text-emerald-400 w-6 h-6">
                                    {SVG_DNA}
                                </span>
                                一遺伝子雑種 マルチカードメーカー
                            </h1>
                            <div className="flex gap-3 w-full md:w-auto justify-center">
                                <a href="./index.html" className="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg font-bold shadow transition-transform active:scale-95 text-sm flex items-center justify-center">ポータルに戻る</a>
                                <button onClick={() => window.print()} className="bg-emerald-500 hover:bg-emerald-600 px-4 py-2 rounded-lg font-bold shadow flex items-center justify-center gap-2 transition-transform active:scale-95 text-sm">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>
                                    A4サイズで印刷
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* ▼ 変更：ご指定の通り、以前のわかりやすいデザインの印刷説明に復元！ */}
                    <div className="no-print max-w-4xl mx-auto mt-6 mb-8 bg-white p-6 md:p-8 rounded-2xl shadow-md border-l-8 border-emerald-500">
                        <h3 className="font-bold text-xl mb-5 text-slate-800 flex items-center gap-2">
                            🖨 印刷時の必須設定（<span className="text-rose-600">キャッシュカードサイズ 86×54mm 専用</span>）
                        </h3>
                        
                        <div className="bg-rose-50 border border-rose-200 rounded-xl p-5 mb-5">
                            <ul className="list-disc pl-6 space-y-2.5 font-bold text-slate-800 text-base">
                                <li>用紙サイズ：A4</li>
                                <li className="text-rose-600">レイアウト：<strong>「 横 」（ランドスケープ）</strong> ※必須！</li>
                                <li>倍率：100%（規定サイズ / 実際のサイズ）</li>
                                <li>余白：なし（最小）</li>
                                <li className="text-rose-600">両面印刷：<strong>「 短辺とじ 」</strong> ※長辺とじだと裏が逆さまになります！</li>
                                <li>オプション：「背景のグラフィックを印刷する」にチェック</li>
                            </ul>
                        </div>

                        <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-5 text-emerald-900 leading-relaxed text-sm font-medium space-y-2">
                            <p>💡 エーワンの「キャッシュカードサイズ 厚口（品番: 51164 など）」をプリンタにセットし、「短辺とじ」で両面印刷してください。印刷後、ミシン目でパリッと切り離すだけで本格的なカードが完成します！</p>
                            <p>🌟 <strong>さらに本格的に！：</strong> 切り離したカードを市販の「86×54mm対応スリーブ（アーケードサイズ・ミニサイズ等）」に入れると、シャッフルしやすくなり、汚れや折れを防いで何年も使い回せる最高の教具になります。</p>
                            <p className="text-emerald-700 font-bold">※カード束を管理できる「ペアの名前 記入カード」2枚を含んだ構成になっています。1シートで2ペア分のセットが作れます。</p>
                            <p className="text-rose-600 font-bold">※注意：一般的な「名刺サイズ（91×55mm）」の用紙ではミシン目と完全にズレるため使用できません！</p>
                            <p className="text-slate-500">（※最後に白紙が出力される場合は、印刷ページを「1-2」と指定してください）</p>
                        </div>
                    </div>

                    <div className="flex flex-col items-center print:block">
                        <A4Page>{renderFront(monoCards)}</A4Page>
                        <A4Page>{renderBack(monoCards)}</A4Page>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
