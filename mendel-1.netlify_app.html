<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一遺伝子雑種 LIVE集計</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- Babel設定：自動ランタイムによるエラーを回避するためclassicモードを登録 -->
    <script>
        Babel.registerPreset('react-classic', {
            presets: [
                [Babel.availablePresets['react'], { "runtime": "classic" }]
            ]
        });
    </script>

    <!-- アプリケーションコード -->
    <script type="text/babel" data-type="module" data-presets="react-classic">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const { useState, useEffect, useMemo, useRef } = React;

        // 管理者パスワード設定
        const ADMIN_PASSWORD = "9331";

        const isCanvasEnv = typeof __firebase_config !== 'undefined' && typeof __app_id !== 'undefined';
        const myFirebaseConfig = {
            apiKey: "AIzaSyCar5BfWLpkeMZY3CvQXWPafMcy7-3j0Ao",
            authDomain: "mendelapp-e8546.firebaseapp.com",
            projectId: "mendelapp-e8546",
            storageBucket: "mendelapp-e8546.firebasestorage.app",
            messagingSenderId: "440177963313",
            appId: "1:440177963313:web:4a022fa480f2217aeb0010"
        };
        const firebaseConfig = isCanvasEnv ? JSON.parse(__firebase_config) : myFirebaseConfig;
        const currentAppId = isCanvasEnv ? __app_id : "matsumoto-mendel-1";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const CLASS_LIST = ['A組', 'B組', 'C組', 'D組', 'E組', 'F組', 'G組', 'H組', '先生モード'];

        function App() {
            const [user, setUser] = useState(null);
            const [classGroup, setClassGroup] = useState('A組');
            const [name, setName] = useState('');
            const [passwordInput, setPasswordInput] = useState('');
            const [isNameSet, setIsNameSet] = useState(false);
            const [myCounts, setMyCounts] = useState({ AA: 0, Aa: 0, aa: 0 });
            const [allData, setAllData] = useState([]);
            const [error, setError] = useState(null);
            
            const [filterClass, setFilterClass] = useState('all');
            const [showHelp, setShowHelp] = useState(false);
            // ▼ 追加：詳細データの展開状態を保持
            const [expandedTeams, setExpandedTeams] = useState({});

            // タイマー用ステート（全クラスのタイマー状態を保持）
            const [allTimers, setAllTimers] = useState({});
            const [timeLeft, setTimeLeft] = useState(null);
            const [timerMinutes, setTimerMinutes] = useState(5); // 初期値5分

            // --- 新設：最新のステートを監視するためのRef ---
            const isNameSetRef = useRef(isNameSet);
            useEffect(() => { isNameSetRef.current = isNameSet; }, [isNameSet]);
            
            const classGroupRef = useRef(classGroup);
            useEffect(() => { classGroupRef.current = classGroup; }, [classGroup]);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (isCanvasEnv && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        setError(`認証エラー: ${e.message}`);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;

                const dataRef = collection(db, 'artifacts', currentAppId, 'public', 'data', 'mendel_data');
                const unsubscribeData = onSnapshot(query(dataRef), (snapshot) => {
                    const data = [];
                    snapshot.forEach((doc) => data.push({ id: doc.id, ...doc.data() }));
                    setAllData(data);

                    if (!isNameSetRef.current) {
                        const myDoc = data.find(d => d.id === user.uid);
                        if (myDoc && myDoc.name) {
                            if (myDoc.classGroup === '先生モード') {
                                // ▼ 変更：先生モードの時は、リロード時にデータを消去して初期画面に戻る
                                deleteDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'mendel_data', user.uid)).catch(console.error);
                            } else {
                                setClassGroup(myDoc.classGroup || 'A組');
                                setName(myDoc.name);
                                setMyCounts({ AA: myDoc.AA || 0, Aa: myDoc.Aa || 0, aa: myDoc.aa || 0 });
                                setIsNameSet(true);
                            }
                        }
                    } else {
                        const myDoc = data.find(d => d.id === user.uid);
                        if (!myDoc && classGroupRef.current !== '先生モード') {
                            alert("管理者によってデータが消去されました。\n最初から正しいクラスと班名で入り直してください。");
                            setIsNameSet(false);
                            setName('');
                            setMyCounts({ AA: 0, Aa: 0, aa: 0 });
                        }
                    }
                });

                const timerRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'timer_state', 'classes');
                const unsubscribeTimer = onSnapshot(timerRef, (docSnap) => {
                    if (docSnap.exists()) {
                        setAllTimers(docSnap.data());
                    } else {
                        setAllTimers({});
                    }
                });

                return () => { unsubscribeData(); unsubscribeTimer(); };
            }, [user]);

            // 現在注目すべきタイマークラスを決定（先生は対象クラス、生徒は自分のクラス）
            const activeTimerClass = classGroup === '先生モード' ? filterClass : classGroup;
            const currentTimerState = allTimers[activeTimerClass] || { isRunning: false, endTime: null };

            useEffect(() => {
                if (currentTimerState.isRunning && currentTimerState.endTime) {
                    const interval = setInterval(() => {
                        const diff = currentTimerState.endTime - Date.now();
                        if (diff <= 0) {
                            setTimeLeft(0);
                            clearInterval(interval);
                        } else {
                            setTimeLeft(diff);
                        }
                    }, 100);
                    return () => clearInterval(interval);
                } else {
                    setTimeLeft(null);
                }
            }, [currentTimerState.isRunning, currentTimerState.endTime]);

            const updateDB = async (newCounts, currentClassGroup, currentName) => {
                if (!user) return;
                try {
                    await setDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'mendel_data', user.uid), {
                        classGroup: currentClassGroup, name: currentName, ...newCounts, updatedAt: new Date().toISOString()
                    }, { merge: true });
                } catch (e) {
                    alert("データ保存に失敗しました。");
                }
            };

            // 生徒の入力可否判定（先生は常に可能、生徒はタイマー稼働中のみ可能）
            const isInputDisabled = classGroup !== '先生モード' && (!currentTimerState.isRunning || timeLeft === 0 || timeLeft === null);

            const handleIncrement = (type) => {
                if (isInputDisabled) return; // ロック時は無効化
                const newCounts = { ...myCounts, [type]: myCounts[type] + 1 };
                setMyCounts(newCounts);
                updateDB(newCounts, classGroup, name);
            };

            const handleDecrement = (type) => {
                if (isInputDisabled) return; // ロック時は無効化
                if (myCounts[type] > 0) {
                    const newCounts = { ...myCounts, [type]: myCounts[type] - 1 };
                    setMyCounts(newCounts);
                    updateDB(newCounts, classGroup, name);
                }
            };

            const handleDirectInput = (type, value) => {
                const num = value === '' ? 0 : parseInt(value, 10);
                if (!isNaN(num) && num >= 0) {
                    const newCounts = { ...myCounts, [type]: num };
                    setMyCounts(newCounts);
                    updateDB(newCounts, classGroup, name);
                }
            };

            // ▼ 変更：asyncを追加し、ログイン時に過去の先生データを一掃する処理を追加
            const handleJoin = async (e) => {
                e.preventDefault();
                if (classGroup === '先生モード') {
                    if (passwordInput === ADMIN_PASSWORD) {
                        // 過去の「先生モード」のゴミデータを一掃する
                        const oldTeacherDocs = allData.filter(d => d.classGroup === '先生モード');
                        for (const oldDoc of oldTeacherDocs) {
                            await deleteDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'mendel_data', oldDoc.id)).catch(console.error);
                        }

                        setIsNameSet(true);
                        setName('先生');
                        const resetCounts = { AA: 0, Aa: 0, aa: 0 };
                        setMyCounts(resetCounts);
                        updateDB(resetCounts, '先生モード', '先生');
                        setFilterClass('all'); 
                    } else {
                        alert("パスワードが違います。");
                    }
                } else if (name.trim()) {
                    setIsNameSet(true);
                    updateDB(myCounts, classGroup, name.trim());
                    setFilterClass(classGroup);
                }
            };

            const handleReset = async () => {
                if (filterClass === 'simulation') {
                    if (!confirm(`シミュレーション（先生）のデータをすべて 0 に戻しますか？`)) return;
                    setMyCounts({ AA: 0, Aa: 0, aa: 0 });
                    updateDB({ AA: 0, Aa: 0, aa: 0 }, '先生モード', '先生');
                    alert(`シミュレーションデータをリセットしました。`);
                    return;
                }

                const targetName = filterClass === 'all' ? '学年全体（生徒）' : filterClass;
                if (!confirm(`本当に「${targetName}」のデータをすべて削除して 0 に戻しますか？`)) return;
                try {
                    const targets = filterClass === 'all' ? allData.filter(d => d.classGroup !== '先生モード') : allData.filter(d => d.classGroup === filterClass);
                    for (const d of targets) await deleteDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'mendel_data', d.id));
                    alert(`${targetName} のデータをリセットしました。`);
                } catch (e) {
                    alert("データの削除に失敗しました。");
                }
            };

            const handleKick = async (id, className, groupName) => {
                if (!confirm(`本当に ${className}「${groupName}」のデータを消去し、ログアウトさせますか？\n（いたずらや登録間違いの修正用）`)) return;
                try {
                    await deleteDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'mendel_data', id));
                } catch (e) {
                    alert("データの削除に失敗しました。");
                }
            };

            const startTimer = async (minutes) => {
                if (filterClass === 'all' || filterClass === 'simulation') {
                    alert("タイマーを開始する対象クラスを選択してください。");
                    return;
                }
                const mins = parseInt(minutes, 10);
                if (isNaN(mins) || mins <= 0) return;
                const endTime = Date.now() + mins * 60 * 1000;
                await setDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'timer_state', 'classes'), {
                    [filterClass]: { endTime, isRunning: true }
                }, { merge: true });
            };
            
            const stopTimer = async () => {
                if (filterClass === 'all' || filterClass === 'simulation') {
                    alert("タイマーを停止する対象クラスを選択してください。");
                    return;
                }
                await setDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'timer_state', 'classes'), {
                    [filterClass]: { endTime: null, isRunning: false }
                }, { merge: true });
            };

            const handleExportCSV = () => {
                let targetData = [];
                if (filterClass === 'simulation') {
                    targetData = allData.filter(d => d.classGroup === '先生モード');
                } else if (filterClass === 'all') {
                    targetData = allData.filter(d => d.classGroup !== '先生モード');
                } else {
                    targetData = allData.filter(d => d.classGroup === filterClass);
                }

                if (targetData.length === 0) {
                    alert("出力するデータがありません。");
                    return;
                }
                
                let csvContent = "クラス,班名,AA,Aa,aa,計\n";
                targetData.forEach(d => {
                    const total = (d.AA || 0) + (d.Aa || 0) + (d.aa || 0);
                    csvContent += `"${d.classGroup}","${d.name}",${d.AA || 0},${d.Aa || 0},${d.aa || 0},${total}\n`;
                });

                const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
                const blob = new Blob([bom, csvContent], { type: "text/csv;charset=utf-8;" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `一遺伝子雑種_${filterClass}_${new Date().toISOString().slice(0, 10)}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const formatTime = (ms) => {
                if (ms === null) return '';
                const totalSeconds = Math.ceil(ms / 1000);
                const m = Math.floor(totalSeconds / 60);
                const s = totalSeconds % 60;
                return `${m}:${s.toString().padStart(2, '0')}`;
            };

            const processedData = useMemo(() => {
                let targetData = [];
                if (classGroup === '先生モード') {
                    if (filterClass === 'simulation') {
                        targetData = allData.filter(d => d.classGroup === '先生モード');
                    } else if (filterClass === 'all') {
                        targetData = allData.filter(d => d.classGroup !== '先生モード');
                    } else {
                        targetData = allData.filter(d => d.classGroup === filterClass);
                    }
                } else {
                    targetData = allData.filter(d => d.classGroup === classGroup);
                }
                    
                let maxTotal = 0;
                const dataWithStats = targetData.map(d => {
                    const total = (d.AA || 0) + (d.Aa || 0) + (d.aa || 0);
                    if (total > maxTotal) maxTotal = total;
                    return { ...d, total };
                });
                return dataWithStats.map(d => ({
                    ...d, isTopCount: d.total > 0 && d.total === maxTotal
                })).sort((a, b) => b.total - a.total); 
            }, [allData, filterClass, classGroup]);

            const totals = useMemo(() => {
                let targetData = [];
                if (classGroup === '先生モード') {
                    if (filterClass === 'simulation') {
                        targetData = allData.filter(d => d.classGroup === '先生モード');
                    } else if (filterClass === 'all') {
                        targetData = allData.filter(d => d.classGroup !== '先生モード');
                    } else {
                        targetData = allData.filter(d => d.classGroup === filterClass);
                    }
                } else {
                    targetData = allData.filter(d => d.classGroup !== '先生モード');
                }

                return targetData.reduce((acc, curr) => ({
                    AA: acc.AA + (curr.AA || 0),
                    Aa: acc.Aa + (curr.Aa || 0),
                    aa: acc.aa + (curr.aa || 0)
                }), { AA: 0, Aa: 0, aa: 0 });
            }, [allData, filterClass, classGroup]);

            const totalTrials = totals.AA + totals.Aa + totals.aa;
            const dominant = totals.AA + totals.Aa;
            const recessive = totals.aa;
            const maxGenotypeCount = Math.max(totals.AA, totals.Aa, totals.aa, 1);

            const ratioAA = totals.aa > 0 ? (totals.AA / totals.aa).toFixed(1) : '-';
            const ratioAa = totals.aa > 0 ? (totals.Aa / totals.aa).toFixed(1) : '-';
            const ratioDom = recessive > 0 ? (dominant / recessive).toFixed(1) : '-';
            
            const radius = 60;
            const circumference = 2 * Math.PI * radius;
            const dominantPct = totalTrials === 0 ? 0 : (dominant / totalTrials);
            const strokeDasharray = `${dominantPct * circumference} ${circumference}`;

            if (error) return <div className="min-h-screen flex items-center justify-center text-red-500 font-bold px-4 text-center">{error}</div>;
            if (!user) return <div className="min-h-screen flex items-center justify-center text-slate-500 font-bold">システムに接続中...</div>;

            if (!isNameSet) {
                return (
                    <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border-t-8 border-emerald-500 relative">
                            <button onClick={() => setShowHelp(true)} className="absolute top-4 right-4 w-8 h-8 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 font-bold flex items-center justify-center transition-colors font-serif italic" title="アプリの概要">i</button>
                            <h1 className="text-2xl font-bold text-center text-slate-800 mb-2">一遺伝子雑種 LIVE集計</h1>
                            <p className="text-center text-slate-500 mb-6 text-sm">自分のクラスとペア名を入力してください</p>
                            <form onSubmit={handleJoin} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-1">クラス</label>
                                    <select value={classGroup} onChange={(e) => setClassGroup(e.target.value)} className="w-full px-4 py-3 rounded-lg border-2 border-slate-200 focus:border-emerald-500 outline-none font-bold text-slate-700 bg-white">
                                        {CLASS_LIST.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                {classGroup !== '先生モード' ? (
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">ペアの名前</label>
                                        <input type="text" value={name} onChange={(e) => setName(e.target.value)} placeholder="例：ワトソン&クリックペア" className="w-full px-4 py-3 rounded-lg border-2 border-slate-200 focus:border-emerald-500 outline-none font-bold text-slate-700" required />
                                    </div>
                                ) : (
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">管理者パスワード</label>
                                        <input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} placeholder="パスワードを入力" className="w-full px-4 py-3 rounded-lg border-2 border-slate-200 focus:border-red-500 outline-none font-bold text-slate-700" required />
                                    </div>
                                )}
                                <button type="submit" className={`w-full ${classGroup === '先生モード' ? 'bg-slate-700 hover:bg-slate-800' : 'bg-emerald-500 hover:bg-emerald-600'} text-white font-bold py-3 rounded-lg transition-colors mt-4`}>
                                    {classGroup === '先生モード' ? '管理者としてログイン' : 'ログイン'}
                                </button>
                            </form>
                        </div>
                        {showHelp && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                                <div className="bg-white rounded-2xl p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto relative shadow-2xl">
                                    <button onClick={() => setShowHelp(false)} className="absolute top-4 right-4 w-8 h-8 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 font-bold flex items-center justify-center">✕</button>
                                    <h2 className="text-xl font-bold text-slate-800 mb-4 border-b border-emerald-200 pb-2 flex items-center gap-2">
                                        <span className="font-serif italic text-emerald-600">i</span> アプリの概要
                                    </h2>
                                    <div className="space-y-6 text-sm text-slate-700">
                                        <div>
                                            <h4 className="font-bold text-slate-800 bg-slate-100 px-2 py-1 rounded inline-block mb-2">この実験のねらい</h4>
                                            <ol className="list-decimal pl-5 space-y-2">
                                                <li><b>仕組みを知る:</b> 減数分裂と受精によって、遺伝子がどう組み合わさるかを理解しよう！</li>
                                                <li><b>大数の法則を体感:</b> 班のデータとクラス全員のデータを比べ、全体データが「3：1」に近づいていく美しさを確かめよう。</li>
                                                <li><b>メンデルのすごさを知る:</b> 1人で約3万回も実験したメンデルの熱意を感じてみよう！</li>
                                            </ol>
                                        </div>
                                        <div>
                                            <h4 className="font-bold text-slate-800 bg-slate-100 px-2 py-1 rounded inline-block mb-2">準備するもの</h4>
                                            <ul className="list-disc pl-5 space-y-1">
                                                <li><b>トランプ型カード（各班1セット）</b>
                                                    <ul className="list-none pl-2 mt-2 space-y-1 font-medium text-slate-600">
                                                        <li>・【雄カード】2枚（A, a）</li>
                                                        <li>・【雌カード】2枚（A, a）</li>
                                                        <li className="text-xs mt-1 text-slate-500">※ 表面の色を変えるなどして、雌雄を区別できるように準備してください。</li>
                                                    </ul>
                                                </li>
                                            </ul>
                                        </div>
                                    </div>
                                    <div className="mt-6 text-center">
                                        <button onClick={() => setShowHelp(false)} className="bg-slate-800 hover:bg-slate-700 text-white font-bold py-2 px-8 rounded-lg shadow-sm">閉じる</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20">
                    <div className="sticky top-0 z-40 w-full flex flex-col shadow-md">
                        <header className="bg-slate-800 text-white p-3 md:p-4">
                            <div className="max-w-4xl mx-auto flex flex-col lg:flex-row lg:justify-between lg:items-center gap-2 md:gap-3">
                                <h1 className="font-bold text-lg flex items-center gap-2 whitespace-nowrap">
                                    <i className="lucide-activity text-emerald-400"></i>
                                    LIVE集計：一遺伝子雑種
                                </h1>
                                <div className="flex flex-wrap items-center gap-1.5 md:gap-2">
                                    {classGroup === '先生モード' && (
                                        <div className="flex items-center gap-1 bg-slate-700 p-1 pl-2 rounded-lg text-sm border border-slate-600">
                                            <span className="font-bold text-slate-300">⏱</span>
                                            <input 
                                                type="number" min="1" max="60" 
                                                value={timerMinutes} 
                                                onChange={(e) => setTimerMinutes(e.target.value)}
                                                className="w-10 text-center text-slate-800 rounded outline-none p-0.5 font-bold shadow-inner"
                                            />
                                            <span className="text-slate-300">分</span>
                                            <button onClick={() => startTimer(timerMinutes)} className="bg-slate-600 hover:bg-emerald-500 text-white px-2 py-0.5 rounded transition-colors font-bold shadow-sm ml-1">開始</button>
                                            <button onClick={stopTimer} className="bg-slate-600 hover:bg-red-500 text-white px-2 py-0.5 rounded transition-colors font-bold shadow-sm">停止</button>
                                        </div>
                                    )}
                                    
                                    <button onClick={() => setShowHelp(true)} className="bg-slate-700 hover:bg-slate-600 text-white text-sm font-bold py-1 px-2 md:px-3 rounded-lg transition-colors flex items-center gap-1 shadow-sm">
                                        {classGroup === '先生モード' ? '？ マニュアル' : '？ ルール'}
                                    </button>
                                    
                                    {classGroup !== '先生モード' && (
                                        <div className="flex items-center gap-1 bg-slate-700 px-2 md:px-3 py-1 rounded-lg text-sm font-bold text-slate-200">
                                            📍 {classGroup}
                                        </div>
                                    )}

                                    {classGroup === '先生モード' && (
                                        <div className="flex items-center gap-1.5 bg-slate-700 p-1 pl-2 rounded-lg text-sm">
                                            <span className="font-bold text-slate-300">対象:</span>
                                            <select value={filterClass} onChange={(e) => setFilterClass(e.target.value)} className="bg-slate-600 text-white font-bold py-0.5 px-1 rounded outline-none border border-slate-500 focus:border-emerald-400 cursor-pointer">
                                                <option value="simulation">デモ</option>
                                                <option value="all">学年全体</option>
                                                {CLASS_LIST.filter(c => c !== '先生モード').map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                    )}

                                    {classGroup === '先生モード' && (
                                        <>
                                            <button onClick={handleExportCSV} className="bg-blue-500 hover:bg-blue-600 text-white text-sm font-bold py-1 px-2 md:px-3 rounded-lg transition-colors flex items-center gap-1 shadow-sm">
                                                CSV
                                            </button>
                                            <button onClick={handleReset} className="bg-red-500 hover:bg-red-600 text-white text-sm font-bold py-1 px-2 md:px-3 rounded-lg transition-colors flex items-center gap-1 shadow-sm">
                                                リセット
                                            </button>
                                        </>
                                    )}
                                </div>
                            </div>
                        </header>

                        <div className={`w-full text-center font-black transition-colors ${
                            activeTimerClass === 'all' ? 'bg-slate-200 text-slate-600 py-2 md:py-3 text-xl md:text-2xl' :
                            currentTimerState.isRunning && timeLeft > 0 && timeLeft <= 10000 ? 'bg-red-100 text-red-600 py-2 md:py-3 text-2xl md:text-3xl' :
                            currentTimerState.isRunning && timeLeft > 10000 ? 'bg-emerald-100 text-emerald-800 py-2 md:py-3 text-2xl md:text-3xl' :
                            currentTimerState.isRunning && timeLeft === 0 ? 'bg-red-500 text-white animate-pulse py-2 md:py-3 text-2xl md:text-3xl' :
                            'bg-slate-200 text-slate-600 py-2 md:py-3 text-xl md:text-2xl'
                        }`}>
                            {
                                activeTimerClass === 'all' ? '対象クラスを選択してタイマーを使用' :
                                currentTimerState.isRunning && timeLeft > 0 ? `残り ${formatTime(timeLeft)}` :
                                currentTimerState.isRunning && timeLeft === 0 ? '終了！！入力ストップ！' :
                                '待機中（タイマー開始で入力可能になります）'
                            }
                        </div>
                    </div>

                    <main className="max-w-4xl mx-auto p-4 space-y-6 mt-4">
                        <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 md:p-6">
                            <div className="flex flex-col md:flex-row md:justify-between md:items-center mb-6 border-b pb-2 gap-2">
                                <h2 className="text-lg font-bold text-slate-800">
                                    {classGroup === '先生モード' ? (filterClass === 'simulation' ? '📊 デモ' : filterClass === 'all' ? '🏫 学年全体' : `📝 ${filterClass}`) : '🏫 学年全体'} のデータ
                                </h2>
                                <span className="font-bold text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full text-sm border border-emerald-100">総試行回数: {totalTrials} 回</span>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="flex flex-col items-center justify-center bg-slate-50 rounded-xl p-4 border border-slate-100">
                                    <h3 className="font-bold text-slate-600 mb-4">表現型の比率 (目標 3:1)</h3>
                                    <div className="relative w-40 h-40 mb-4 transform -rotate-90">
                                        <svg viewBox="0 0 140 140" className="w-full h-full">
                                            <circle cx="70" cy="70" r={radius} fill="transparent" stroke="#3b82f6" strokeWidth="20" />
                                            <circle cx="70" cy="70" r={radius} fill="transparent" stroke="#10b981" strokeWidth="20" strokeDasharray={strokeDasharray} className="transition-all duration-500 ease-out" />
                                        </svg>
                                        <div className="absolute inset-0 flex flex-col items-center justify-center transform rotate-90">
                                            <span className="text-3xl font-bold text-slate-800">{totalTrials}</span>
                                            <span className="text-sm text-slate-500 font-bold">回</span>
                                        </div>
                                    </div>
                                    <div className="flex gap-4 w-full justify-center text-center">
                                        <div>
                                            <div className="text-emerald-500 font-bold">顕性 (A_)</div>
                                            <div className="text-2xl font-bold">{dominant}</div>
                                            <div className="text-sm bg-emerald-100 text-emerald-800 rounded-full px-2 mt-1">{ratioDom}</div>
                                        </div>
                                        <div className="text-2xl font-bold text-slate-300 self-center">:</div>
                                        <div>
                                            <div className="text-blue-500 font-bold">潜性 (aa)</div>
                                            <div className="text-2xl font-bold">{recessive}</div>
                                            <div className="text-sm bg-blue-100 text-blue-800 rounded-full px-2 mt-1">1.0</div>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex flex-col justify-center space-y-4">
                                    <h3 className="font-bold text-slate-600 mb-2">遺伝子型の比率 (目標 1:2:1)</h3>
                                    {['AA', 'Aa', 'aa'].map(type => {
                                        const count = totals[type];
                                        const ratio = type === 'aa' ? '1.0' : (type === 'AA' ? ratioAA : ratioAa);
                                        const heightPct = maxGenotypeCount === 0 ? 0 : (count / maxGenotypeCount) * 100;
                                        return (
                                            <div key={type}>
                                                <div className="flex justify-between text-sm font-bold mb-1">
                                                    <span className={type === 'aa' ? 'text-blue-500' : 'text-emerald-500'}>{type}</span>
                                                    <span className="text-slate-500">{count}回 (比: {ratio})</span>
                                                </div>
                                                <div className="h-4 w-full bg-slate-100 rounded-full overflow-hidden">
                                                    <div className={`h-full ${type === 'aa' ? 'bg-blue-500' : 'bg-emerald-500'} transition-all duration-500`} style={{ width: `${heightPct}%` }}></div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </section>

                        {(classGroup !== '先生モード' || filterClass === 'simulation') && (
                            <section className="bg-white rounded-2xl shadow-lg border-2 border-emerald-500 p-4 md:p-6 relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-2 bg-emerald-500"></div>
                                <div className="flex flex-col md:flex-row md:justify-between md:items-center mb-6 gap-2">
                                    <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                        {classGroup === '先生モード' ? '🎯 デモ 入力パネル' : `🎯 ${classGroup} - ${name} の入力パネル`}
                                    </h2>
                                    <span className="text-sm font-bold text-emerald-700 bg-emerald-50 px-3 py-1 rounded-full border border-emerald-100">自分たちの記録: {myCounts.AA + myCounts.Aa + myCounts.aa} 回</span>
                                </div>
                                <div className="grid grid-cols-3 gap-3 md:gap-6">
                                    {['AA', 'Aa', 'aa'].map(type => (
                                        <div key={type} className="flex flex-col gap-2">
                                            <button onClick={() => handleIncrement(type)} disabled={isInputDisabled} className={`${type === 'aa' ? 'bg-blue-500 hover:bg-blue-600' : 'bg-emerald-500 hover:bg-emerald-600'} ${isInputDisabled ? 'opacity-50 cursor-not-allowed' : ''} text-white rounded-xl p-4 md:p-8 flex flex-col items-center shadow-md active:scale-95 transition-transform`}>
                                                <span className="text-2xl font-bold">＋ {type}</span>
                                            </button>
                                            <div className="flex items-center justify-between bg-slate-50 rounded-lg p-2 border border-slate-200">
                                                <button onClick={() => handleDecrement(type)} disabled={isInputDisabled} className={`w-8 h-8 flex items-center justify-center bg-white border border-slate-200 rounded text-slate-400 font-bold shadow-sm ${isInputDisabled ? 'opacity-50 cursor-not-allowed' : 'hover:text-red-500 hover:border-red-200 transition-colors'}`}>－</button>
                                                {classGroup === '先生モード' ? (
                                                    <input type="number" min="0" value={myCounts[type] === 0 ? '' : myCounts[type]} onChange={(e) => handleDirectInput(type, e.target.value)} className="w-20 text-center font-bold text-xl text-slate-700 bg-white border border-emerald-300 rounded focus:border-emerald-500 outline-none p-1 shadow-inner" placeholder="0" />
                                                ) : (
                                                    <span className="font-bold text-xl text-slate-700">{myCounts[type]}</span>
                                                )}
                                                <div className="w-8"></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}

                        <section className="bg-slate-50 rounded-xl p-4 border border-slate-200 shadow-inner">
                            <div className="flex justify-between items-center mb-4 border-b border-slate-200 pb-2">
                                <h3 className="text-sm font-bold text-slate-700 flex items-center gap-2">
                                    🏆 {classGroup === '先生モード' ? (filterClass === 'simulation' ? 'デモ データ' : filterClass === 'all' ? '学年全体 ランキング' : `${filterClass} ランキング`) : `ランキング`}
                                </h3>
                                <div className="flex gap-3 text-xs font-bold text-slate-500">
                                    <span className="flex items-center gap-1"><span className="bg-yellow-400 text-white px-1.5 py-0.5 rounded text-[10px]">TOP</span> トップ</span>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                {processedData.length === 0 ? (
                                    <div className="col-span-full text-center text-slate-400 text-sm py-4">データがありません</div>
                                ) : (
                                    processedData.map(d => (
                                        <div key={d.id} className={`relative p-3 rounded-lg text-sm border shadow-sm transition-all ${d.id === user?.uid ? 'bg-emerald-50 border-emerald-300 ring-2 ring-emerald-300 scale-105 z-10' : 'bg-white border-slate-200'}`}>
                                            {classGroup === '先生モード' && d.classGroup !== '先生モード' && (
                                                <button 
                                                    onClick={() => handleKick(d.id, d.classGroup, d.name)}
                                                    className="absolute -top-2 -left-2 bg-red-100 text-red-600 hover:bg-red-500 hover:text-white rounded-full w-6 h-6 flex items-center justify-center font-bold shadow-md transition-colors z-20"
                                                    title="この班のデータを消去して強制ログアウト"
                                                >✕</button>
                                            )}
                                            {d.isTopCount && <div className="absolute -top-2 -right-2 flex gap-1"><span className="bg-yellow-400 text-white px-1.5 py-0.5 rounded text-[10px] font-bold shadow border border-yellow-500" title="最多試行回数！">TOP</span></div>}
                                            <div className="text-xs font-bold text-emerald-500 mb-0.5">{d.classGroup}</div>
                                            <div className="font-bold text-slate-800 truncate mb-1 text-base">{d.name}</div>
                                            <div className="flex justify-between items-end">
                                                <div className={`text-xs font-bold px-2 py-1 rounded inline-block ${d.isTopCount ? 'bg-yellow-100 text-yellow-800' : 'bg-slate-100 text-slate-500'}`}>
                                                    計 {d.total} 回
                                                </div>
                                            </div>
                                            
                                            {/* ▼ 追加：先生モードのみ詳細展開ボタン */}
                                            {classGroup === '先生モード' && (
                                                <div className="mt-2 pt-2 border-t border-slate-100">
                                                    <button 
                                                        onClick={() => setExpandedTeams(prev => ({ ...prev, [d.id]: !prev[d.id] }))} 
                                                        className="text-[11px] font-bold text-slate-400 hover:text-slate-600 flex items-center justify-center w-full transition-colors py-1"
                                                    >
                                                        {expandedTeams[d.id] ? '▲ 閉じる' : '▼ 詳細データ'}
                                                    </button>
                                                    {expandedTeams[d.id] && (
                                                        <div className="mt-2 text-xs bg-slate-50 p-2 rounded border border-slate-100">
                                                            <div className="flex justify-between mb-1 text-slate-600">
                                                                <span>AA: {d.AA||0}</span><span>Aa: {d.Aa||0}</span><span>aa: {d.aa||0}</span>
                                                            </div>
                                                            <div className="font-bold text-center mt-1.5 text-emerald-600 bg-emerald-50 py-0.5 rounded">
                                                                比 {(d.aa||0)>0 ? (((d.AA||0)+(d.Aa||0))/d.aa).toFixed(1) : '-'} : 1.0
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    ))
                                )}
                            </div>
                        </section>
                    </main>

                    {showHelp && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl p-6 max-w-lg w-full max-h-[90vh] overflow-y-auto relative shadow-2xl">
                                <button onClick={() => setShowHelp(false)} className="absolute top-4 right-4 w-8 h-8 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 font-bold flex items-center justify-center">✕</button>
                                
                                {classGroup === '先生モード' ? (
                                    <>
                                        <h2 className="text-xl font-bold text-slate-800 mb-4 border-b border-emerald-200 pb-2">先生モード 機能マニュアル</h2>
                                        <div className="space-y-4 text-sm text-slate-700">
                                            <ul className="space-y-3">
                                                <li><b className="text-emerald-600">クラス個別タイマー＆入力制限</b><br/>選択した「対象クラス」の生徒に対してのみタイマーが発動します。また、<b>生徒はタイマーが動いている時間帯しかデータを入力（＋、ー）できなくなります。</b></li>
                                                <li><b className="text-emerald-600">対象クラスの切り替え</b><br/>グラフやランキングを「学年全体」「各クラス」「デモ」に切り替えられます。<b>生徒のグラフデータに先生のデモ入力が混ざることはありません。</b></li>
                                                <li><b className="text-emerald-600">CSVダウンロード</b><br/>現在表示している対象クラスのデータをCSVファイルでダウンロードできます。Excelでの成績処理等にご活用ください。</li>
                                                <li><b className="text-emerald-600">全データリセット</b><br/>現在表示している対象クラスの全データを一括で 0 に戻します。対象が「デモ」の場合は先生の入力のみリセットします。</li>
                                                <li><b className="text-emerald-600">強制ログアウト（キック）</b><br/>各班の「✕」ボタンを押すとその班のデータを消去し、対象生徒を初期画面に強制的に戻します。（登録間違いやイタズラ対応用）</li>
                                                {/* ▼ 変更：マニュアルの記述を更新 */}
                                                <li><b className="text-emerald-600">デモ用 直接入力</b><br/><b>対象を「デモ」に切り替えた時のみ</b>、先生用の入力パネルが表示され、数値を直接打ち込めます。また、ブラウザをリロードすると先生のデータは消去され、初期画面に戻ります。（過去の先生データも再ログイン時に自動で一掃されます）</li>
                                            </ul>
                                        </div>
                                    </>
                                ) : (
                                    <>
                                        <h2 className="text-xl font-bold text-slate-800 mb-4 border-b border-emerald-200 pb-2">📖 実験のルール</h2>
                                        <div className="space-y-4 text-sm text-slate-700">
                                            <h3 className="font-bold text-emerald-600 text-base">🎯 F2の分離比 3 : 1 をみんなで確かめよう!</h3>
                                            <ol className="list-decimal pl-5 space-y-3">
                                                <li><b>♂役と♀役を決め、それぞれAとaの2枚のカード</b>を裏向きにして持ち、相手に見えないようにシャッフルする。</li>
                                                <li>互いに相手の手札から、1枚ずつカードを引く。</li>
                                                <li>引いた2枚のカードの組み合わせ（<b>AA、Aa、aa</b>）を確認する。</li>
                                                <li>代表者が、組み合わせの遺伝子型に対応する<b>＋ボタン</b>を1回タップして入力する。<br/>
                                                    <span className="text-xs text-slate-500 font-bold">※もし間違えて押してしまったら、下のマイナスを押して消す。</span>
                                                </li>
                                                <li>引いたカードを戻して再度シャッフルし、2〜5を繰り返す。<br/>
                                                    <span className="text-xs text-emerald-600 font-bold">（1つの班で何回やってもOK！たくさんデータを集めよう）</span>
                                                </li>
                                            </ol>
                                        </div>
                                    </>
                                )}
                                
                                <div className="mt-6 text-center">
                                    <button onClick={() => setShowHelp(false)} className="bg-slate-800 hover:bg-slate-700 text-white font-bold py-2 px-8 rounded-lg shadow-sm">閉じる</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
