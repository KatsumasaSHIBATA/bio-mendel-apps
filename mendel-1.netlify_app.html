<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一遺伝子雑種 LIVE集計</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script>
        Babel.registerPreset('react-classic', {
            presets: [
                [Babel.availablePresets['react'], { "runtime": "classic" }]
            ]
        });
    </script>

    <script type="text/babel" data-type="module" data-presets="react-classic">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const { useState, useEffect, useMemo } = React;

        const ADMIN_PASSWORD = "9331";
        const isCanvasEnv = typeof __firebase_config !== 'undefined' && typeof __app_id !== 'undefined';

        const myFirebaseConfig = {
            apiKey: "AIzaSyCar5BfWLpkeMZY3CvQXWPafMcy7-3j0Ao",
            authDomain: "mendelapp-e8546.firebaseapp.com",
            projectId: "mendelapp-e8546",
            storageBucket: "mendelapp-e8546.firebasestorage.app",
            messagingSenderId: "440177963313",
            appId: "1:440177963313:web:4a022fa480f2217aeb0010"
        };

        const firebaseConfig = isCanvasEnv ? JSON.parse(__firebase_config) : myFirebaseConfig;
        const currentAppId = isCanvasEnv ? __app_id : "matsumoto-mendel-1";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const CLASS_LIST = ['A組', 'B組', 'C組', 'D組', 'E組', 'F組', 'G組', 'H組', '先生モード'];

        function App() {
            const [user, setUser] = useState(null);
            const [classGroup, setClassGroup] = useState('A組');
            const [name, setName] = useState('');
            const [passwordInput, setPasswordInput] = useState('');
            const [isNameSet, setIsNameSet] = useState(false);
            const [myCounts, setMyCounts] = useState({ AA: 0, Aa: 0, aa: 0 });
            const [allData, setAllData] = useState([]);
            const [error, setError] = useState(null);
            
            const [filterClass, setFilterClass] = useState('all');
            const [showHelp, setShowHelp] = useState(false);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (isCanvasEnv && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        console.error("認証エラー:", e);
                        setError(`認証エラー: ${e.message}`);
                    }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;

                const dataRef = collection(db, 'artifacts', currentAppId, 'public', 'data', 'mendel_data');
                const q = query(dataRef);

                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const data = [];
                    snapshot.forEach((doc) => {
                        data.push({ id: doc.id, ...doc.data() });
                    });
                    
                    data.sort((a, b) => {
                        if (a.classGroup !== b.classGroup) return (a.classGroup || '').localeCompare(b.classGroup || '');
                        return (a.name || '').localeCompare(b.name || '');
                    });
                    setAllData(data);

                    if (!isNameSet) {
                        const myDoc = data.find(d => d.id === user.uid);
                        if (myDoc && myDoc.name) {
                            setClassGroup(myDoc.classGroup || 'A組');
                            setName(myDoc.name);
                            setMyCounts({ AA: myDoc.AA || 0, Aa: myDoc.Aa || 0, aa: myDoc.aa || 0 });
                            setIsNameSet(true);
                        }
                    }
                }, (err) => {
                    console.error("同期エラー:", err);
                    setError("データの読み込み権限がありません。");
                });
                return () => unsubscribe();
            }, [user, isNameSet]);

            const updateDB = async (newCounts, currentClassGroup, currentName) => {
                if (!user) return;
                try {
                    const docRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'mendel_data', user.uid);
                    await setDoc(docRef, {
                        classGroup: currentClassGroup,
                        name: currentName,
                        ...newCounts,
                        updatedAt: new Date().toISOString()
                    }, { merge: true });
                } catch (e) {
                    console.error("エラー:", e);
                }
            };

            const handleIncrement = (type) => {
                const newCounts = { ...myCounts, [type]: myCounts[type] + 1 };
                setMyCounts(newCounts);
                updateDB(newCounts, classGroup, name);
            };

            const handleDecrement = (type) => {
                if (myCounts[type] > 0) {
                    const newCounts = { ...myCounts, [type]: myCounts[type] - 1 };
                    setMyCounts(newCounts);
                    updateDB(newCounts, classGroup, name);
                }
            };

            const handleDirectInput = (type, value) => {
                const num = value === '' ? 0 : parseInt(value, 10);
                if (!isNaN(num) && num >= 0) {
                    const newCounts = { ...myCounts, [type]: num };
                    setMyCounts(newCounts);
                    updateDB(newCounts, classGroup, name);
                }
            };

            const handleJoin = (e) => {
                e.preventDefault();
                if (classGroup === '先生モード') {
                    if (passwordInput === ADMIN_PASSWORD) {
                        setIsNameSet(true);
                        setName('先生');
                        updateDB(myCounts, '先生モード', '先生');
                        setFilterClass('all');
                    } else {
                        alert("パスワードが違います。");
                    }
                } else if (name.trim()) {
                    setIsNameSet(true);
                    updateDB(myCounts, classGroup, name.trim());
                    setFilterClass(classGroup);
                }
            };

            const handleReset = async () => {
                const targetName = filterClass === 'all' ? '学年全体の全クラス' : filterClass;
                if (!confirm(`本当に「${targetName}」のデータをすべて削除して 0 に戻しますか？`)) return;
                try {
                    const targets = filterClass === 'all' ? allData : allData.filter(d => d.classGroup === filterClass);
                    for (const d of targets) {
                        await deleteDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'mendel_data', d.id));
                    }
                    alert(`${targetName} のデータをリセットしました。`);
                } catch (e) {
                    alert("データの削除に失敗しました。");
                }
            };

            const filteredData = useMemo(() => {
                if (filterClass === 'all') return allData;
                return allData.filter(d => d.classGroup === filterClass);
            }, [allData, filterClass]);

            const totals = useMemo(() => {
                return filteredData.reduce((acc, curr) => ({
                    AA: acc.AA + (curr.AA || 0),
                    Aa: acc.Aa + (curr.Aa || 0),
                    aa: acc.aa + (curr.aa || 0)
                }), { AA: 0, Aa: 0, aa: 0 });
            }, [filteredData]);

            const totalTrials = totals.AA + totals.Aa + totals.aa;
            const dominant = totals.AA + totals.Aa;
            const recessive = totals.aa;
            const maxGenotypeCount = Math.max(totals.AA, totals.Aa, totals.aa, 1);

            const ratioAA = totals.aa > 0 ? (totals.AA / totals.aa).toFixed(1) : '-';
            const ratioAa = totals.aa > 0 ? (totals.Aa / totals.aa).toFixed(1) : '-';
            const ratioDom = recessive > 0 ? (dominant / recessive).toFixed(1) : '-';
            
            const radius = 60;
            const circumference = 2 * Math.PI * radius;
            const dominantPct = totalTrials === 0 ? 0 : (dominant / totalTrials);
            const strokeDasharray = `${dominantPct * circumference} ${circumference}`;

            if (error) return <div className="min-h-screen flex items-center justify-center text-red-500 font-bold px-4 text-center">{error}</div>;
            if (!user) return <div className="min-h-screen flex items-center justify-center text-slate-500 font-bold">システムに接続中...</div>;

            // ▼▼▼ ログイン前画面 ▼▼▼
            if (!isNameSet) {
                return (
                    <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border-t-8 border-emerald-500 relative">
                            <button 
                                onClick={() => setShowHelp(true)}
                                className="absolute top-4 right-4 w-8 h-8 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 hover:text-slate-700 font-bold flex items-center justify-center transition-colors font-serif italic text-lg"
                                title="アプリの概要と使い方"
                            >
                                i
                            </button>
                            <h1 className="text-2xl font-bold text-center text-slate-800 mb-2">一遺伝子雑種 LIVE集計</h1>
                            <p className="text-center text-slate-500 mb-6 text-sm">自分のクラスと班名を入力してください</p>
                            <form onSubmit={handleJoin} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-1">クラス</label>
                                    <select 
                                        value={classGroup} 
                                        onChange={(e) => setClassGroup(e.target.value)}
                                        className="w-full px-4 py-3 rounded-lg border-2 border-slate-200 focus:border-emerald-500 outline-none font-bold text-slate-700 bg-white"
                                    >
                                        {CLASS_LIST.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                {classGroup !== '先生モード' ? (
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">班の名前</label>
                                        <input type="text" value={name} onChange={(e) => setName(e.target.value)} placeholder="例：1班、松本ペア" className="w-full px-4 py-3 rounded-lg border-2 border-slate-200 focus:border-emerald-500 outline-none font-bold text-slate-700" required />
                                    </div>
                                ) : (
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">管理者パスワード</label>
                                        <input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} placeholder="パスワードを入力" className="w-full px-4 py-3 rounded-lg border-2 border-slate-200 focus:border-red-500 outline-none font-bold text-slate-700" required />
                                    </div>
                                )}
                                <button type="submit" className={`w-full ${classGroup === '先生モード' ? 'bg-slate-700 hover:bg-slate-800' : 'bg-emerald-500 hover:bg-emerald-600'} text-white font-bold py-3 rounded-lg transition-colors mt-4`}>
                                    {classGroup === '先生モード' ? '管理者として入室' : '実験スタート'}
                                </button>
                            </form>
                        </div>

                        {/* ログイン前用のヘルプモーダル */}
                        {showHelp && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                                <div className="bg-white rounded-2xl p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto relative shadow-2xl">
                                    <button onClick={() => setShowHelp(false)} className="absolute top-4 right-4 w-8 h-8 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 font-bold flex items-center justify-center">✕</button>
                                    <h2 className="text-xl font-bold text-slate-800 mb-4 border-b border-emerald-200 pb-2 flex items-center gap-2">
                                        <span className="font-serif italic text-emerald-600">i</span> アプリの概要
                                    </h2>
                                    <div className="space-y-6 text-sm text-slate-700">
                                        {/* 1. 本時の目標 */}
                                        <div>
                                            <h4 className="font-bold text-slate-800 bg-slate-100 px-2 py-1 rounded inline-block mb-2">🌟 この実験のねらい</h4>
                                            <ol className="list-decimal pl-5 space-y-2">
                                                <li><b>仕組みを知る:</b> 減数分裂と受精によって、遺伝子がどう組み合わさるかを理解しよう！（パネットスクエアで説明できるようになろう）</li>
                                                <li><b>大数の法則を体感:</b> 班のデータとクラス全員のデータを比べ、全体データが「3：1」に近づいていく美しさを確かめよう。</li>
                                                <li><b>メンデルのすごさを知る:</b> クラス全員で協力しても数千回。1人で約3万回も実験したメンデルの熱意を感じてみよう！</li>
                                            </ol>
                                        </div>
                                        {/* 2. 準備物 */}
                                        <div>
                                            <h4 className="font-bold text-slate-800 bg-slate-100 px-2 py-1 rounded inline-block mb-2">🎒 準備するもの</h4>
                                            <ul className="list-disc pl-5 space-y-1">
                                                <li><b>トランプ型カード（各班1セット）</b>
                                                    <ul className="list-none pl-2 mt-2 space-y-1 font-medium text-slate-600">
                                                        <li>・【♂ 雄カード】2枚（♂ A, ♂ a）</li>
                                                        <li>・【♀ 雌カード】2枚（♀ A, ♀ a）</li>
                                                        <li className="text-xs mt-1 text-slate-500">※ 雄カードと雌カードは、裏面からは見分けがつかないようにしつつ、<b>表面の色を変えるなどして</b>区別できるように準備してください。</li>
                                                    </ul>
                                                </li>
                                            </ul>
                                            <div className="mt-3 bg-emerald-50 p-3 rounded-lg border border-emerald-100 text-xs">
                                                <span className="font-bold text-emerald-700">💡 なぜ色などを分けるの？</span><br/>
                                                4枚から適当に2枚引くのではなく、「お父さんから1枚、お母さんから1枚」をもらうという『受精のルール』を正しく再現するためです。
                                            </div>
                                        </div>
                                    </div>
                                    <div className="mt-6 text-center">
                                        <button onClick={() => setShowHelp(false)} className="bg-slate-800 hover:bg-slate-700 text-white font-bold py-2 px-8 rounded-lg shadow-sm">閉じる</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            // ▼▼▼ ログイン後メイン画面 ▼▼▼
            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-slate-800 text-white p-4 sticky top-0 z-20 shadow-md">
                        <div className="max-w-4xl mx-auto flex flex-col md:flex-row md:justify-between md:items-center gap-3">
                            <h1 className="font-bold text-lg flex items-center gap-2">
                                <i className="lucide-activity text-emerald-400"></i>
                                LIVE集計：一遺伝子雑種
                            </h1>
                            <div className="flex flex-col sm:flex-row items-center gap-2">
                                <button 
                                    onClick={() => setShowHelp(true)}
                                    className="bg-slate-700 hover:bg-slate-600 text-white text-sm font-bold py-1 px-3 rounded-lg transition-colors flex items-center gap-1 shadow-sm mr-2"
                                >
                                    <span className="font-serif italic text-base leading-none">i</span> 概要・ルール
                                </button>
                                <div className="flex items-center gap-2 bg-slate-700 p-1 pl-3 rounded-lg text-sm">
                                    <span className="font-bold text-slate-300">集計対象:</span>
                                    <select value={filterClass} onChange={(e) => setFilterClass(e.target.value)} className="bg-slate-600 text-white font-bold py-1 px-2 rounded outline-none border border-slate-500 focus:border-emerald-400 cursor-pointer">
                                        <option value="all">学年全体（すべて）</option>
                                        {CLASS_LIST.filter(c => c !== '先生モード').map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                {classGroup === '先生モード' && (
                                    <button onClick={handleReset} className="bg-red-500 hover:bg-red-600 text-white text-sm font-bold py-1 px-3 rounded-lg flex items-center gap-1 shadow-sm">データリセット</button>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 space-y-6 mt-4">
                        <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 md:p-6">
                            <div className="flex flex-col md:flex-row md:justify-between md:items-center mb-6 border-b pb-2 gap-2">
                                <h2 className="text-lg font-bold text-slate-800">{filterClass === 'all' ? '🏫 学年全体' : `📝 ${filterClass}`} のデータ</h2>
                                <span className="font-bold text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full text-sm border border-emerald-100">総試行回数: {totalTrials} 回</span>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="flex flex-col items-center justify-center bg-slate-50 rounded-xl p-4 border border-slate-100">
                                    <h3 className="font-bold text-slate-600 mb-4">表現型の比率 (目標 3:1)</h3>
                                    <div className="relative w-40 h-40 mb-4 transform -rotate-90">
                                        <svg viewBox="0 0 140 140" className="w-full h-full">
                                            <circle cx="70" cy="70" r={radius} fill="transparent" stroke="#3b82f6" strokeWidth="20" />
                                            <circle cx="70" cy="70" r={radius} fill="transparent" stroke="#10b981" strokeWidth="20" strokeDasharray={strokeDasharray} className="transition-all duration-500 ease-out" />
                                        </svg>
                                        <div className="absolute inset-0 flex flex-col items-center justify-center transform rotate-90">
                                            <span className="text-3xl font-bold text-slate-800">{totalTrials}</span>
                                            <span className="text-sm text-slate-500 font-bold">回</span>
                                        </div>
                                    </div>
                                    <div className="flex gap-4 w-full justify-center text-center">
                                        <div>
                                            <div className="text-emerald-500 font-bold">顕性 (A_)</div>
                                            <div className="text-2xl font-bold">{dominant}</div>
                                            <div className="text-sm bg-emerald-100 text-emerald-800 rounded-full px-2 mt-1">{ratioDom}</div>
                                        </div>
                                        <div className="text-2xl font-bold text-slate-300 self-center">:</div>
                                        <div>
                                            <div className="text-blue-500 font-bold">潜性 (aa)</div>
                                            <div className="text-2xl font-bold">{recessive}</div>
                                            <div className="text-sm bg-blue-100 text-blue-800 rounded-full px-2 mt-1">1.0</div>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex flex-col justify-center space-y-4">
                                    <h3 className="font-bold text-slate-600 mb-2">遺伝子型の比率 (目標 1:2:1)</h3>
                                    {['AA', 'Aa', 'aa'].map(type => {
                                        const count = totals[type];
                                        const ratio = type === 'aa' ? '1.0' : (type === 'AA' ? ratioAA : ratioAa);
                                        const heightPct = maxGenotypeCount === 0 ? 0 : (count / maxGenotypeCount) * 100;
                                        return (
                                            <div key={type}>
                                                <div className="flex justify-between text-sm font-bold mb-1">
                                                    <span className={type === 'aa' ? 'text-blue-500' : 'text-emerald-500'}>{type}</span>
                                                    <span className="text-slate-500">{count}回 (比: {ratio})</span>
                                                </div>
                                                <div className="h-4 w-full bg-slate-100 rounded-full overflow-hidden">
                                                    <div className={`h-full ${type === 'aa' ? 'bg-blue-500' : 'bg-emerald-500'} transition-all duration-500`} style={{ width: `${heightPct}%` }}></div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </section>

                        <section className="bg-white rounded-2xl shadow-lg border-2 border-emerald-500 p-4 md:p-6 relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-2 bg-emerald-500"></div>
                            <div className="flex flex-col md:flex-row md:justify-between md:items-center mb-6 gap-2">
                                <h2 className="text-xl font-bold text-slate-800">🎯 {classGroup} - {name} の入力パネル</h2>
                                <span className="text-sm font-bold text-emerald-700 bg-emerald-50 px-3 py-1 rounded-full border border-emerald-100">自分たちの記録: {myCounts.AA + myCounts.Aa + myCounts.aa} 回</span>
                            </div>
                            <div className="grid grid-cols-3 gap-3 md:gap-6">
                                {['AA', 'Aa', 'aa'].map(type => (
                                    <div key={type} className="flex flex-col gap-2">
                                        <button onClick={() => handleIncrement(type)} className={`${type === 'aa' ? 'bg-blue-500 hover:bg-blue-600' : 'bg-emerald-500 hover:bg-emerald-600'} text-white rounded-xl p-4 md:p-8 flex flex-col items-center shadow-md active:scale-95 transition-transform`}>
                                            <span className="text-2xl font-bold">＋ {type}</span>
                                        </button>
                                        <div className="flex items-center justify-between bg-slate-50 rounded-lg p-2 border border-slate-200">
                                            <button onClick={() => handleDecrement(type)} className="w-8 h-8 flex items-center justify-center bg-white border border-slate-200 rounded text-slate-400 hover:text-red-500 hover:border-red-200 transition-colors font-bold shadow-sm">－</button>
                                            {classGroup === '先生モード' ? (
                                                <input type="number" min="0" value={myCounts[type] === 0 ? '' : myCounts[type]} onChange={(e) => handleDirectInput(type, e.target.value)} className="w-20 text-center font-bold text-xl text-slate-700 bg-white border border-emerald-300 rounded focus:border-emerald-500 outline-none p-1 shadow-inner" placeholder="0" />
                                            ) : (
                                                <span className="font-bold text-xl text-slate-700">{myCounts[type]}</span>
                                            )}
                                            <div className="w-8"></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <section className="bg-slate-50 rounded-xl p-4 border border-slate-200">
                            <div className="flex justify-between items-center mb-4 border-b border-slate-200 pb-2">
                                <h3 className="text-sm font-bold text-slate-600">👥 {filterClass === 'all' ? '全クラスの状況' : `${filterClass}の状況`}</h3>
                                <span className="text-xs font-bold text-slate-400">表示中: {filteredData.length}班</span>
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                {filteredData.length === 0 ? (
                                    <div className="col-span-full text-center text-slate-400 text-sm py-4">データがありません</div>
                                ) : (
                                    filteredData.map(d => (
                                        <div key={d.id} className={`p-3 rounded-lg text-sm border shadow-sm ${d.id === user?.uid ? 'bg-emerald-50 border-emerald-300 ring-1 ring-emerald-200' : 'bg-white border-slate-200'}`}>
                                            <div className="text-xs font-bold text-emerald-500 mb-0.5">{d.classGroup}</div>
                                            <div className="font-bold text-slate-700 truncate mb-1">{d.name}</div>
                                            <div className="text-xs font-bold text-slate-500 bg-slate-100 rounded px-2 py-1 inline-block">計 {(d.AA||0)+(d.Aa||0)+(d.aa||0)} 回</div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </section>
                    </main>

                    {/* ログイン後用のヘルプモーダル（実験ルール） */}
                    {showHelp && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto relative shadow-2xl">
                                <button onClick={() => setShowHelp(false)} className="absolute top-4 right-4 w-8 h-8 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 font-bold flex items-center justify-center">✕</button>
                                <h2 className="text-xl font-bold text-slate-800 mb-4 border-b border-emerald-200 pb-2 flex items-center gap-2">
                                    <span className="font-serif italic text-emerald-600">i</span> アプリの概要と実験ルール
                                </h2>
                                <div className="space-y-6 text-sm text-slate-700">
                                    {/* 1. 本時の目標 */}
                                    <div>
                                        <h4 className="font-bold text-slate-800 bg-slate-100 px-2 py-1 rounded inline-block mb-2">1. 本時の目標</h4>
                                        <ol className="list-decimal pl-5 space-y-1">
                                            <li><b>知識・理解:</b> 減数分裂による配偶子の形成（分離の法則）と、受精による遺伝子のランダムな組み合わせの仕組みを理解し、パネットスクエアを用いて説明できる。</li>
                                            <li><b>技能・思考:</b> カードを用いた模擬実験を通して結果を予想・検証し、全体データが一定の比率（表現型で顕性：潜性＝3：1）に収束していく現象を見いだすことができる。</li>
                                            <li><b>態度:</b> LIVE集計アプリを用いてクラス全員で集めたデータと、メンデルが一人で行った膨大な実験データ（約30,000回）を比較し、科学的な探究やデータの蓄積に対する関心と敬意を持つ。</li>
                                        </ol>
                                    </div>
                                    {/* 2. 準備物 */}
                                    <div>
                                        <h4 className="font-bold text-slate-800 bg-slate-100 px-2 py-1 rounded inline-block mb-2">2. 準備物（教具）</h4>
                                        <ul className="list-disc pl-5 space-y-1">
                                            <li><b>カードセット（各班1セット）</b>
                                                <ul className="list-disc pl-5 mt-1 space-y-1">
                                                    <li><b>仕様:</b> トランプ様カード。</li>
                                                    <li><b>構成:</b>
                                                        <ul className="list-none pl-2 mt-1 space-y-1">
                                                            <li>・雄（♂）用カード：灰系色で「♂ A」「♂ a」と明記（計2枚）</li>
                                                            <li>・雌（♀）用カード：白系色で「♀ A」「♀ a」と明記（計2枚）</li>
                                                        </ul>
                                                    </li>
                                                </ul>
                                            </li>
                                        </ul>
                                        <p className="mt-2 text-xs text-slate-500 italic">※工夫の意図: 雌雄を色と記号で完全に分けることで、生徒が「4枚から2枚を適当に引く」ことによる確率のズレを防ぎ、生物学的な受精の過程を正しく再現させる。</p>
                                    </div>
                                    {/* 3. 実験のルール */}
                                    <div>
                                        <h4 className="font-bold text-slate-800 bg-emerald-100 text-emerald-800 px-2 py-1 rounded inline-block mb-2">3. 実験のルール</h4>
                                        <h5 className="font-bold text-emerald-600 mb-2">🎯 F2の分離比 3 : 1 をみんなで確かめよう!</h5>
                                        <ol className="list-decimal pl-5 space-y-2">
                                            <li><b>♂役と♀役を決め、それぞれAとaの2枚のカード</b>を裏向きにして持ち、相手に見えないようにシャッフルする。</li>
                                            <li>互いに相手の手札から、1枚ずつカードを引く。</li>
                                            <li>引いた2枚のカードの組み合わせ（<b>AA、Aa、aa</b>）を確認する。</li>
                                            <li>代表者が、組み合わせの遺伝子型に対応する<b>＋ボタン</b>を1回タップして入力する。<br/>
                                                <span className="text-xs text-slate-500 font-bold">※もし間違えて押してしまったら、下のマイナスを押して消す。</span>
                                            </li>
                                            <li>引いたカードを戻して再度シャッフルし、2〜5を繰り返す。<br/>
                                                <span className="text-xs text-emerald-600 font-bold">（1つの班で何回やってもOK！たくさんデータを集めよう）</span>
                                            </li>
                                        </ol>
                                    </div>
                                </div>
                                <div className="mt-6 text-center">
                                    <button onClick={() => setShowHelp(false)} className="bg-slate-800 hover:bg-slate-700 text-white font-bold py-2 px-8 rounded-lg shadow-sm">閉じる</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
