<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一遺伝子雑種 LIVE集計</title>
    <!-- Tailwind CSS (スタイリング) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (UI構築) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (ブラウザ上でJSXを変換) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- Babel設定 -->
    <script>
        Babel.registerPreset('react-classic', {
            presets: [
                [Babel.availablePresets['react'], { "runtime": "classic" }]
            ]
        });
    </script>

    <!-- アプリケーションのコード -->
    <script type="text/babel" data-type="module" data-presets="react-classic">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const { useState, useEffect, useMemo } = React;

        // =====================================================================
        // 環境判定（プレビュー画面か、GitHub本番環境か）
        // =====================================================================
        const isCanvasEnv = typeof __firebase_config !== 'undefined' && typeof __app_id !== 'undefined';

        // 先生のFirebase設定情報（合鍵）
        const myFirebaseConfig = {
            apiKey: "AIzaSyCar5BfWLpkeMZY3CvQXWPafMcy7-3j0Ao",
            authDomain: "mendelapp-e8546.firebaseapp.com",
            projectId: "mendelapp-e8546",
            storageBucket: "mendelapp-e8546.firebasestorage.app",
            messagingSenderId: "440177963313",
            appId: "1:440177963313:web:4a022fa480f2217aeb0010"
        };

        // 環境に応じて設定を自動切り替え
        const firebaseConfig = isCanvasEnv ? JSON.parse(__firebase_config) : myFirebaseConfig;
        const currentAppId = isCanvasEnv ? __app_id : "matsumoto-mendel-1";

        // Firebaseの初期化
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function App() {
            const [user, setUser] = useState(null);
            const [name, setName] = useState('');
            const [isNameSet, setIsNameSet] = useState(false);
            const [myCounts, setMyCounts] = useState({ AA: 0, Aa: 0, aa: 0 });
            const [allData, setAllData] = useState([]);
            const [error, setError] = useState(null);

            // 1. 認証プロセス
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        // プレビュー環境用と本番環境（GitHub）用で認証方式を自動切替
                        if (isCanvasEnv && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        console.error("認証エラー詳細:", e);
                        setError(`認証エラー: ${e.message}。Firebaseで「匿名認証」が有効になっているか、ドメインが許可されているか確認してください。`);
                    }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // 2. リアルタイム同期
            useEffect(() => {
                if (!user) return; // ログイン完了まで待つ

                const dataRef = collection(db, 'artifacts', currentAppId, 'public', 'data', 'mendel_data');
                const q = query(dataRef);

                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const data = [];
                    snapshot.forEach((doc) => {
                        data.push({ id: doc.id, ...doc.data() });
                    });
                    data.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
                    setAllData(data);
                }, (err) => {
                    console.error("同期エラー:", err);
                    setError("データの読み込み権限がありません。Firestoreが「テストモード」か確認してください。");
                });
                return () => unsubscribe();
            }, [user]);

            // 3. データの書き込み
            const updateDB = async (newCounts, currentName) => {
                if (!user) return;
                try {
                    const docRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'mendel_data', user.uid);
                    await setDoc(docRef, {
                        name: currentName,
                        ...newCounts,
                        updatedAt: new Date().toISOString()
                    }, { merge: true });
                } catch (e) {
                    console.error("エラー:", e);
                    alert("データ保存に失敗しました。");
                }
            };

            const handleIncrement = (type) => {
                const newCounts = { ...myCounts, [type]: myCounts[type] + 1 };
                setMyCounts(newCounts);
                updateDB(newCounts, name);
            };

            const handleDecrement = (type) => {
                if (myCounts[type] > 0) {
                    const newCounts = { ...myCounts, [type]: myCounts[type] - 1 };
                    setMyCounts(newCounts);
                    updateDB(newCounts, name);
                }
            };

            const handleJoin = (e) => {
                e.preventDefault();
                if (name.trim()) {
                    setIsNameSet(true);
                    updateDB(myCounts, name.trim());
                }
            };

            const totals = useMemo(() => {
                return allData.reduce((acc, curr) => ({
                    AA: acc.AA + (curr.AA || 0),
                    Aa: acc.Aa + (curr.Aa || 0),
                    aa: acc.aa + (curr.aa || 0)
                }), { AA: 0, Aa: 0, aa: 0 });
            }, [allData]);

            const totalTrials = totals.AA + totals.Aa + totals.aa;
            const dominant = totals.AA + totals.Aa;
            const recessive = totals.aa;

            const ratioAA = totals.aa > 0 ? (totals.AA / totals.aa).toFixed(1) : '-';
            const ratioAa = totals.aa > 0 ? (totals.Aa / totals.aa).toFixed(1) : '-';
            const ratioDom = recessive > 0 ? (dominant / recessive).toFixed(1) : '-';
            
            const radius = 60;
            const circumference = 2 * Math.PI * radius;
            const dominantPct = totalTrials === 0 ? 0 : (dominant / totalTrials);
            const strokeDasharray = `${dominantPct * circumference} ${circumference}`;

            if (error) {
                return <div className="min-h-screen flex items-center justify-center text-red-500 font-bold px-4 text-center">{error}</div>;
            }

            if (!user) {
                return <div className="min-h-screen flex items-center justify-center text-slate-500 font-bold">システムに接続中...</div>;
            }

            if (!isNameSet) {
                return (
                    <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full">
                            <h1 className="text-2xl font-bold text-center text-slate-800 mb-2">一遺伝子雑種 LIVE集計</h1>
                            <p className="text-center text-slate-500 mb-8 text-sm">班の名前を入力して参加してください</p>
                            <form onSubmit={handleJoin} className="space-y-4">
                                <input
                                    type="text"
                                    value={name}
                                    onChange={(e) => setName(e.target.value)}
                                    placeholder="例：1班"
                                    className="w-full px-4 py-3 rounded-lg border-2 border-slate-200 focus:border-emerald-500 outline-none text-center font-bold"
                                    required
                                />
                                <button type="submit" className="w-full bg-emerald-500 text-white font-bold py-3 rounded-lg">実験スタート</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-slate-800 text-white p-4 sticky top-0 z-10 shadow-md">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <h1 className="font-bold text-lg">LIVE集計：一遺伝子雑種</h1>
                            <div className="text-sm bg-slate-700 px-3 py-1 rounded-full">参加: {allData.length}班</div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 space-y-6 mt-4">
                        {/* グラフエリア */}
                        <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 md:p-6">
                            <h2 className="text-lg font-bold text-slate-700 mb-6 border-b pb-2">クラス全体のデータ</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="flex flex-col items-center justify-center bg-slate-50 rounded-xl p-4">
                                    <h3 className="font-bold text-slate-600 mb-4">表現型の比率 (目標 3:1)</h3>
                                    <div className="relative w-40 h-40 mb-4 transform -rotate-90">
                                        <svg viewBox="0 0 140 140" className="w-full h-full">
                                            <circle cx="70" cy="70" r={radius} fill="transparent" stroke="#3b82f6" strokeWidth="20" />
                                            <circle cx="70" cy="70" r={radius} fill="transparent" stroke="#10b981" strokeWidth="20" 
                                                    strokeDasharray={strokeDasharray} className="transition-all duration-500 ease-out" />
                                        </svg>
                                        <div className="absolute inset-0 flex flex-col items-center justify-center transform rotate-90">
                                            <span className="text-3xl font-bold text-slate-800">{totalTrials}</span>
                                            <span className="text-sm text-slate-500 font-bold">回</span>
                                        </div>
                                    </div>
                                    <div className="flex gap-4 w-full justify-center text-center">
                                        <div>
                                            <div className="text-emerald-500 font-bold">顕性 (A_)</div>
                                            <div className="text-2xl font-bold">{dominant}</div>
                                            <div className="text-sm bg-emerald-100 text-emerald-800 rounded-full px-2 mt-1">{ratioDom}</div>
                                        </div>
                                        <div className="text-2xl font-bold text-slate-300 self-center">:</div>
                                        <div>
                                            <div className="text-blue-500 font-bold">潜性 (aa)</div>
                                            <div className="text-2xl font-bold">{recessive}</div>
                                            <div className="text-sm bg-blue-100 text-blue-800 rounded-full px-2 mt-1">1.0</div>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex flex-col justify-center space-y-4">
                                    <h3 className="font-bold text-slate-600 mb-2">遺伝子型の比率 (目標 1:2:1)</h3>
                                    {['AA', 'Aa', 'aa'].map(type => (
                                        <div key={type}>
                                            <div className="flex justify-between text-sm font-bold mb-1">
                                                <span className={type === 'aa' ? 'text-blue-500' : 'text-emerald-500'}>{type}</span>
                                                <span className="text-slate-500">{totals[type]}回 (比: {type==='aa'?'1.0':(type==='AA'?ratioAA:ratioAa)})</span>
                                            </div>
                                            <div className="h-4 w-full bg-slate-100 rounded-full overflow-hidden">
                                                <div className={`h-full ${type === 'aa' ? 'bg-blue-500' : 'bg-emerald-500'} transition-all duration-500`} 
                                                     style={{ width: `${Math.max(totals.AA, totals.Aa, totals.aa) === 0 ? 0 : (totals[type] / Math.max(totals.AA, totals.Aa, totals.aa, 1)) * 100}%` }}></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* 入力パネル */}
                        <section className="bg-white rounded-2xl shadow-lg border-2 border-emerald-500 p-4 md:p-6 relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-2 bg-emerald-500"></div>
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-xl font-bold text-slate-800">🎯 {name} の入力パネル</h2>
                                <span className="text-sm font-bold text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full">計 {myCounts.AA + myCounts.Aa + myCounts.aa} 回</span>
                            </div>
                            <div className="grid grid-cols-3 gap-3 md:gap-6">
                                {['AA', 'Aa', 'aa'].map(type => (
                                    <div key={type} className="flex flex-col gap-2">
                                        <button onClick={() => handleIncrement(type)} className={`${type === 'aa' ? 'bg-blue-500 hover:bg-blue-600' : 'bg-emerald-500 hover:bg-emerald-600'} text-white rounded-xl p-4 md:p-8 flex flex-col items-center shadow-md active:scale-95 transition-transform`}>
                                            <span className="text-2xl font-bold">＋ {type}</span>
                                        </button>
                                        <div className="flex items-center justify-between bg-slate-50 rounded-lg p-2 border">
                                            <button onClick={() => handleDecrement(type)} className="p-1 text-slate-400 hover:text-red-500 font-bold">－</button>
                                            <span className="font-bold text-lg">{myCounts[type]}</span>
                                            <div className="w-6"></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* 班リスト */}
                        <section className="bg-slate-50 rounded-xl p-4 border border-slate-200">
                            <h3 className="text-sm font-bold text-slate-500 mb-3">各班の状況</h3>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                                {allData.map(d => (
                                    <div key={d.id} className={`p-2 rounded-lg text-sm border ${d.id === user?.uid ? 'bg-emerald-50 border-emerald-200 font-bold' : 'bg-white'}`}>
                                        <div className="text-slate-600 truncate">{d.name}</div>
                                        <div className="text-xs text-slate-400">計: {(d.AA||0)+(d.Aa||0)+(d.aa||0)}回</div>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
